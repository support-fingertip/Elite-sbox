name: Deploy PBIS Task 4 (manifest)

# Manual, on-demand deploy of ONLY the Task 4 (PBIS Actuals & Incentive
# calculation) metadata listed in manifest/pbis_task4.xml: the calculation
# service, batch, scheduler, quick-action + list-button entry points, the
# User.PBIS_Policy__c lookup and PBIS_Target.Profile__c formula, the updated
# layout and PBIS_Target_Admin permission set.
#
# Requires Tasks 1-3 and the org-only User field Monthly_Gross_Salary_INR__c to
# already exist in the target org.
#
# Run from the GitHub UI: Actions -> "Deploy PBIS Task 4 (manifest)" -> Run
# workflow. NOTE: a workflow_dispatch workflow only appears once this file is on
# the repo's default branch.

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run PBISActuals_ServiceTest during deploy'
        type: boolean
        default: false
      check_only:
        description: 'Validate only (dry run, no changes committed to the org)'
        type: boolean
        default: false

jobs:
  deploy-task4:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_AUTH_URL }}" > authfile.txt
          sf org login sfdx-url --sfdx-url-file authfile.txt --alias deployment-org --set-default

      - name: Deploy Task 4 manifest
        run: |
          ARGS="--manifest manifest/pbis_task4.xml --target-org deployment-org --wait 30"
          if [ "${{ inputs.check_only }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.run_tests }}" = "true" ]; then
            ARGS="$ARGS --test-level RunSpecifiedTests --tests PBISActuals_ServiceTest"
          fi
          echo "sf project deploy start $ARGS"
          sf project deploy start $ARGS
