name: Deploy Free Quantity Scheme Fix

# Manual, on-demand deploy of the Free Quantity activation-threshold fix:
# the productScreen4 (order screen) and secondaryOrders (invoice wizard) LWC bundles.
# The fix gates the Free Quantity price reduction so it activates only when the total
# quantity reaches Min Qty + Free Qty (e.g. 11+1 = 12), not Min Qty (11).
#
# Run from the GitHub UI: Actions -> "Deploy Free Quantity Scheme Fix" -> Run workflow.
# (A workflow_dispatch workflow only appears in the Actions UI once this file is on the
# branch GitHub shows the dropdown for.)

on:
  workflow_dispatch:
    inputs:
      check_only:
        description: 'Validate only (dry run, no changes committed to the org)'
        type: boolean
        default: false

jobs:
  deploy-free-quantity-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_AUTH_URL }}" > authfile.txt
          sf org login sfdx-url --sfdx-url-file authfile.txt --alias deployment-org --set-default

      - name: Deploy Free Quantity LWCs
        run: |
          ARGS="--source-dir force-app/main/default/lwc/productScreen4 --source-dir force-app/main/default/lwc/secondaryOrders --target-org deployment-org --wait 30"
          if [ "${{ inputs.check_only }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "sf project deploy start $ARGS"
          sf project deploy start $ARGS
