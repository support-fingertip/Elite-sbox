name: Deploy PBIS Actuals

# On-demand deploy of the PBIS Actuals & Incentive calculation metadata listed in
# manifest/pbis_task4.xml: the calculation service + batch + scheduler, the
# quick-action and list-button entry points, the SDParameter_Controller change that
# aliases the user field as `uid` (needed by the grouped queries), the
# PBIS_Target.Profile__c formula and the PBIS_Target layout.
#
# Requires Tasks 1-3 and the org-only User fields Monthly_Gross_Salary_INR__c and
# PBIS_Policy__c to already exist in the target org.
#
# Run from the GitHub UI: Actions -> "Deploy PBIS Actuals" -> Run workflow.
# A workflow_dispatch workflow only appears once this file is on the default branch.
#
# IMPORTANT: after a successful deploy, run scripts/apex/regen_sd_parameter_soql.apex
# once in the org so existing S&D Parameters regenerate their stored SOQL with the
# `uid` alias (otherwise their grouped queries return 0 achievement).

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run the PBIS Actuals tests during deploy'
        type: boolean
        default: true
      check_only:
        description: 'Validate only (dry run, no changes committed to the org)'
        type: boolean
        default: false

jobs:
  deploy-pbis-actuals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_AUTH_URL }}" > authfile.txt
          sf org login sfdx-url --sfdx-url-file authfile.txt --alias deployment-org --set-default

      - name: Deploy PBIS Actuals manifest
        run: |
          ARGS="--manifest manifest/pbis_task4.xml --target-org deployment-org --wait 30"
          if [ "${{ inputs.check_only }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.run_tests }}" = "true" ]; then
            ARGS="$ARGS --test-level RunSpecifiedTests --tests PBISActuals_ServiceTest --tests PBISActualsBatchTest --tests PBISActualsSchedulerTest --tests PBISActuals_ControllerTest --tests PBISActualsRefreshControllerTest --tests SDParameter_ControllerTest"
          fi
          echo "sf project deploy start $ARGS"
          sf project deploy start $ARGS
