<template>
    <template lwc:if={isPageLoaded}>
        <div >
            <c-on-loading-screen></c-on-loading-screen>
        </div>
    </template>
    <template lwc:else>
        <div class="page">
            <!-- HEADER -->
            <div class="header">
                <div>
                    <div class="title">
                        Existing Secondary Customer
                    </div>
                    <div class="subtitle">
                        Fill in the visit details
                    </div>
                </div>
            </div>

            <!-- FORM -->
            <div class="form">
                <!-- Primary Customer -->
                <lightning-record-picker
                    label="Primary Customer"
                    placeholder="Search Customer..."
                    object-api-name="Account"
                    value={defaultPrimaryCustomerId}
                    display-info={displayInfo}
                    matching-info={matchingInfo}
                    filter={accountFilter}
                    onchange={handlePrimaryCustomerSelect}
                    required>
                </lightning-record-picker>

                <c-secondary-customer-lookup
                    primary-customer-id={defaultPrimaryCustomerId}
                    preselected-record-id={defaultSecondaryCustomerId}
                    preselected-record-name={defaultCustomerName}
                    onselect={handleSecondarySelect}>
                </c-secondary-customer-lookup>

                <!-- Product Category -->
                <lightning-combobox
                    label="Product Category"
                    options={categoryOptions}
                    value={productCategory}
                    data-field="productCategory"
                    onchange={handleChange}
                    required>
                </lightning-combobox>

                <!-- Product Group -->
                <template lwc:if={showProductGroup}>
                    <div class="field">
                        <label class="label">
                            Product Group
                            <span class="required">*</span>
                        </label>
                        <lightning-checkbox-group
                            options={groupOptions}
                            value={selectedProductGroups}
                            onchange={handleGroupChange}>
                        </lightning-checkbox-group>
                    </div>
                </template>

                <!-- Competitor Name -->
                <lightning-input
                    label="Competitor Name"
                    value={competitorName}
                    data-field="competitorName"
                    onchange={handleChange}
                    required>
                </lightning-input>

                <!-- Competitor Product -->
                <lightning-input
                    label="Competitor Product"
                    value={competitorProduct}
                    data-field="competitorProduct"
                    onchange={handleChange}
                    required>
                </lightning-input>

                <!-- Competitor Product Image -->
                <div class="upload-field">
                    <label class="label">
                        Competitor Product Image
                        <span class="required">*</span>
                    </label>
                    <div class="upload-wrapper">
                        <input
                            type="file"
                            class="file-input"
                            accept="image/*"
                            onchange={handleCompetitorProductImage}>
                        <div class="upload-box">
                            <lightning-icon
                                icon-name="utility:upload"
                                size="x-small">
                            </lightning-icon>
                            <span class="upload-text">
                                Upload Files
                            </span>
                            <span class="upload-sub">
                                Or drop files
                            </span>
                        </div>
                    </div>
                    <template if:true={competitorProductImageName}>
                        <div class="file-name">
                            {competitorProductImageName}
                        </div>
                    </template>
                </div>

                <!-- Competitor Remarks -->
                <lightning-textarea
                    label="Competitor Remarks"
                    value={competitorRemarks}
                    data-field="competitorRemarks"
                    onchange={handleChange}
                    required>
                </lightning-textarea>

                <!-- General Remarks -->
                <lightning-textarea
                    label="General Remarks"
                    value={generalRemarks}
                    data-field="generalRemarks"
                    onchange={handleChange}
                    required>
                </lightning-textarea>

                <!-- Secondary Customer Image -->
                <div class="upload-field">
                    <label class="label">
                        Secondary Customer Image
                        <span class="required">*</span>
                    </label>
                    <div class="upload-wrapper">
                        <input
                            type="file"
                            class="file-input"
                            accept="image/*"
                            onchange={handleSecondaryCustomerImage}>
                        <div class="upload-box">
                            <lightning-icon
                                icon-name="utility:upload"
                                size="x-small">
                            </lightning-icon>
                            <span class="upload-text">
                                Upload Files
                            </span>
                            <span class="upload-sub">
                                Or drop files
                            </span>
                        </div>
                    </div>
                    <template if:true={customerImageName}>
                        <div class="file-name">
                            {customerImageName}
                        </div>
                    </template>
                </div>

                <!-- BUTTONS -->
                <div class="button-row">
                    <lightning-button
                        label="Cancel"
                        onclick={handleBack}>
                    </lightning-button>
                    <lightning-button
                        label="Submit"
                        variant="brand"
                        onclick={handleGetLatLon}>
                    </lightning-button>
                </div>
            </div>
        </div>
    </template>
</template>
