<template>

<div class="page">
<div class="container">

    <!-- HEADER -->
    <div class="header">

        <lightning-button-icon
            icon-name="utility:back"
            onclick={handleBack}>
        </lightning-button-icon>

        <div>

            <div class="title">
                Sub Stockiest - New Market Expansion
            </div>

            <div class="subtitle">
                Fill in the visit details
            </div>

        </div>

    </div>


    <!-- FORM -->
    <div class="form">


        <lightning-combobox
            label="Customer Type"
            value={customerType}
            options={customerTypeOptions}
            data-field="customerType"
            onchange={handleChange}
            required>
        </lightning-combobox>


        <lightning-combobox
            label="Visit Type"
            value={visitType}
            options={visitTypeOptions}
            data-field="visitType"
            onchange={handleChange}
            required>
        </lightning-combobox>


        <lightning-input
            label="Sub Stockiest Name"
            value={subStockiestName}
            data-field="subStockiestName"
            onchange={handleChange}
            required>
        </lightning-input>


        <lightning-combobox
            label="Secondary Customer Business Type"
            value={secondaryBusinessType}
            options={businessTypeOptions}
            data-field="secondaryBusinessType"
            onchange={handleChange}
            required>
        </lightning-combobox>


        <lightning-combobox
            label="Product Category"
            value={productCategory}
            options={categoryOptions}
            data-field="productCategory"
            onchange={handleChange}
            required>
        </lightning-combobox>


        <!-- Product Group -->
        <div class="field">

            <label class="label">
                Product Group
                <span class="required">*</span>
            </label>

            <template for:each={productGroups} for:item="group" for:index="index">

                <lightning-combobox
                    key={group.id}
                    value={group.value}
                    options={groupOptions}
                    data-index={index}
                    onchange={handleProductGroupChange}
                    required>
                </lightning-combobox>

            </template>

            <div class="add-link" onclick={handleAddProductGroup}>
                Add product group
            </div>

        </div>


        <lightning-combobox
            label="Primary Customer Business Type"
            value={primaryBusinessType}
            options={businessTypeOptions}
            data-field="primaryBusinessType"
            onchange={handleChange}
            required>
        </lightning-combobox>


        <lightning-input
            label="Competitor Name"
            value={competitorName}
            data-field="competitorName"
            onchange={handleChange}>
        </lightning-input>


        <lightning-input
            label="Competitor Product"
            value={competitorProduct}
            data-field="competitorProduct"
            onchange={handleChange}>
        </lightning-input>


        <lightning-textarea
            label="Competitor Remarks"
            value={competitorRemarks}
            data-field="competitorRemarks"
            onchange={handleChange}>
        </lightning-textarea>


        <lightning-textarea
            label="General Remarks"
            value={generalRemarks}
            data-field="generalRemarks"
            onchange={handleChange}
            required>
        </lightning-textarea>


        <lightning-textarea
            label="Address"
            value={address}
            data-field="address"
            onchange={handleChange}
            required>
        </lightning-textarea>


        <!-- State Auto -->
        <lightning-combobox
            label="State (Auto)"
            value={state}
            options={stateOptions}
            onchange={handleStateChange}
            required>
        </lightning-combobox>


        <!-- District Auto -->
        <lightning-combobox
            label="District (Auto)"
            value={district}
            options={districtOptions}
            onchange={handleDistrictChange}
            required>
        </lightning-combobox>


        <lightning-input
            label="Pin Code"
            value={pinCode}
            data-field="pinCode"
            onchange={handleChange}
            required>
        </lightning-input>


        <lightning-input
            label="Contact Number"
            value={contactNumber}
            data-field="contactNumber"
            onchange={handleChange}
            required>
        </lightning-input>


        <!-- Product Image -->
        <div class="field">

            <label class="label">
                Product Image
            </label>

            <div class="upload-wrapper">

                <input type="file"
                       class="file-input"
                       accept="image/*"
                       onchange={handleProductUpload}/>

                <div class="upload-box">

                    <lightning-icon icon-name="utility:upload" size="x-small"></lightning-icon>

                    <span class="upload-text">Upload Files</span>

                    <span class="upload-sub">Or drop files</span>

                </div>

            </div>

        </div>


        <!-- Outlet Image -->
        <div class="field">

            <label class="label">
                Outlet Image
                <span class="required">*</span>
            </label>

            <div class="upload-wrapper">

                <input type="file"
                       class="file-input"
                       accept="image/*"
                       onchange={handleOutletUpload}/>

                <div class="upload-box">

                    <lightning-icon icon-name="utility:upload" size="x-small"></lightning-icon>

                    <span class="upload-text">Upload Files</span>

                    <span class="upload-sub">Or drop files</span>

                </div>

            </div>

        </div>


        <!-- BUTTON -->
        <div class="button-row">

            <lightning-button label="Cancel" onclick={handleBack}></lightning-button>

            <lightning-button label="Submit" variant="brand" onclick={handleSubmit}></lightning-button>

        </div>


    </div>

</div>
</div>

</template>
