<template>

<div class="page">
<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div>

            <div class="title">
                Sub Stockiest - Existing Market
            </div>

            <div class="subtitle">
                Fill in the visit details
            </div>

        </div>

    </div>


    <!-- FORM -->
    <div class="form">


        <!-- Customer Type -->
        <lightning-combobox
            label="Customer Type"
            value={customerType}
            options={customerTypeOptions}
            disabled>
        </lightning-combobox>


        <!-- Visit Type -->
        <lightning-combobox
            label="Visit Type"
            value={visitType}
            options={visitTypeOptions}
            disabled>
        </lightning-combobox>



        <!-- Sub Stockiest Name -->
        <lightning-input
            label="Sub Stockiest Name"
            value={subStockistName}
            data-field="subStockistName"
            onchange={handleChange}
            required>
        </lightning-input>



        <!-- Secondary Customer Business Type -->
        <lightning-combobox
            label="Secondary Customer Business Type"
            value={secondaryBusinessType}
            options={businessTypeOptions}
            data-field="secondaryBusinessType"
            onchange={handleChange}
            required>
        </lightning-combobox>



        <!-- PRIMARY CUSTOMER SEARCHABLE LOOKUP -->
        <div class="field">

           <lightning-input
    label="Primary Customer"
    value={primaryCustomerSearch}
    placeholder="Search Primary Customer"
    onkeyup={handlePrimaryCustomerSearch}
    required>
</lightning-input>


            <!-- Dropdown -->
            <template if:true={showPrimaryCustomerDropdown}>

    <div class="lookup-dropdown">

        <template for:each={filteredPrimaryCustomers}
                  for:item="customer">

            <div key={customer.Id}
                 class="lookup-item"
                 data-id={customer.Id}
                 data-name={customer.Name}
                 onclick={selectPrimaryCustomer}>

                {customer.Name}

            </div>

        </template>

    </div>

</template>

        </div>



        <!-- Product Category -->
        <lightning-combobox
            label="Product Category"
            value={productCategory}
            options={categoryOptions}
            data-field="productCategory"
            onchange={handleChange}
            required>
        </lightning-combobox>



        <!-- Product Group -->
        <div class="field">

            <label class="label">
                Product Group
                <span class="required">*</span>
            </label>

            <template
                for:each={productGroups}
                for:item="group"
                for:index="index">

                <div key={group.id}>

                    <lightning-checkbox-group
                        options={groupOptions}
                        value={group.value}
                        data-index={index}
                        onchange={handleProductGroupChange}>
                    </lightning-checkbox-group>

                </div>

            </template>

            <div
                class="add-link"
                onclick={handleAddProductGroup}>

                Add product group

            </div>

        </div>



        <!-- Competitor Name -->
        <lightning-input
            label="Competitor Name"
            value={competitorName}
            data-field="competitorName"
            onchange={handleChange}>
        </lightning-input>



        <!-- Competitor Product -->
        <lightning-input
            label="Competitor Product"
            value={competitorProduct}
            data-field="competitorProduct"
            onchange={handleChange}>
        </lightning-input>



        <!-- Competitor Product Image -->
        <div class="field">

            <label class="label">
                Competitor Product Image
            </label>

            <div class="upload-wrapper">

                <input
                    type="file"
                    class="file-input"
                    accept="image/*"
                    onchange={handleProductUpload}/>

                <div class="upload-box">

                    <lightning-icon
                        icon-name="utility:upload"
                        size="x-small">
                    </lightning-icon>

                    <span class="upload-text">
                        Upload Files
                    </span>

                    <span class="upload-sub">
                        Or drop files
                    </span>

                </div>

            </div>

        </div>



        <!-- Competitor Remarks -->
        <lightning-textarea
            label="Competitor Remarks"
            value={competitorRemarks}
            data-field="competitorRemarks"
            onchange={handleChange}>
        </lightning-textarea>



        <!-- General Remarks -->
        <lightning-textarea
            label="General Remarks"
            value={generalRemarks}
            data-field="generalRemarks"
            onchange={handleChange}
            required>
        </lightning-textarea>



        <!-- Address -->
        <lightning-textarea
            label="Address"
            value={address}
            data-field="address"
            onchange={handleChange}
            required>
        </lightning-textarea>



        <!-- State -->
        <lightning-combobox
            label="State"
            value={state}
            options={stateOptions}
            onchange={handleStateChange}
            required>
        </lightning-combobox>



        <!-- District -->
        <lightning-combobox
            label="District"
            value={district}
            options={districtOptions}
            onchange={handleDistrictChange}
            required>
        </lightning-combobox>



        <!-- Pin Code -->
        <lightning-input
            label="Pin Code"
            type="tel"
            maxlength="6"
            pattern="[0-9]{6}"
            message-when-pattern-mismatch="Pin Code must be exactly 6 digits"
            value={pinCode}
            data-field="pinCode"
            onchange={handleChange}
            required>
        </lightning-input>



        <!-- Contact Number -->
        <lightning-input
            label="Contact Number"
            type="tel"
            value={contactNumber}
            data-field="contactNumber"
            onchange={handleChange}
            pattern="[0-9]{10}"
            maxlength="10"
            message-when-pattern-mismatch="Contact Number must be exactly 10 digits"
            required>
        </lightning-input>



        <!-- Sub Stockiest Image -->
        <div class="field">

            <label class="label">
                Sub-Stockiest Image
                <span class="required">*</span>
            </label>

            <div class="upload-wrapper">

                <input
                    type="file"
                    class="file-input"
                    accept="image/*"
                    onchange={handleOutletUpload}/>

                <div class="upload-box">

                    <lightning-icon
                        icon-name="utility:upload"
                        size="x-small">
                    </lightning-icon>

                    <span class="upload-text">
                        Upload Files
                    </span>

                    <span class="upload-sub">
                        Or drop files
                    </span>

                </div>

            </div>

        </div>



        <!-- Buttons -->
        <div class="button-row">

            <lightning-button
                label="Cancel"
                onclick={handleBack}>
            </lightning-button>

            <lightning-button
                label="Submit"
                variant="brand"
                onclick={handleSubmit}>
            </lightning-button>

        </div>


    </div>

</div>
</div>

</template>
