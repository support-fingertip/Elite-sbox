<template>
    <!--Beat Card View-->
    <template if:true={isShowBeatData}>
        <div class="outlets">
            <div class="route">

                <!-- ══════════════════════════════════
                        TAB BAR — ADD THIS SECTION
                ══════════════════════════════════ -->
                <div class="tab-bar">
                    <div class={myBeatsTabClass} data-tab="myBeats" onclick={handleTabSwitch}>
                        My Beats
                    </div>
                    <div class={visitFormTabClass} data-tab="visitForm" onclick={handleTabSwitch}>
                        Visit Form Visits
                    </div>
                    <template lwc:if={showReporteeView}>
                        <div class={reportTabClass} data-tab="report" onclick={handleTabSwitch}>
                            Reportee View
                        </div>
                    </template>
                </div>
                <!-- ══════════════════════════════════ -->

                <!--Search Bar — only on My Beats tab-->
                <template lwc:if={myBeatsTabActive}>
                    <!-- When page is loading -->
                    <template lwc:if={isPageLoaded}>
                        <div>
                            <c-on-loading-screen></c-on-loading-screen>
                        </div>
                    </template>
                    <template lwc:else>
                        <!--Search Bar-->
                        <div class="route-filters">
                            <lightning-input type="search" placeholder="Search Beats...." value={searchedbeatVale}
                                onchange={searchBeats} class="slds-input_bare slds-border_none textField">
                            </lightning-input>
                        </div>
                        <!--Beats Card View-->
                        <template lwc:if={hasBeatData}>
                            <template for:each={beatData} for:item="item" for:index="index">
                                <div class="route-outlets" key={item.uiKey}>
                                    <div class="borderLine slds-m-top_small">
                                        <div class="route-outlet">
                                            <!--Beat Name-->
                                            <div class="route-left">
                                                <div class="outlet-title">
                                                    <span class="icon-wrapper">
                                                        <img src={googleIcons.beat} class="custom-icon" width="20"
                                                            height="20" />
                                                    </span>&nbsp;
                                                    <div class="beat-name-wrapper">
                                                        <b>{item.beatName}
                                                            &nbsp;
                                                            <!--Assigned Beat-->
                                                            <template lwc:if={item.istodayBeat}>
                                                                (Assigned)
                                                            </template>
                                                        </b>
                                                    </div>
                                                </div>
                                                <div class="outlet-title" style="padding-left:14px">
                                                    &nbsp;&nbsp; Status : &nbsp;
                                                    <!--Current Beat-->
                                                    <template lwc:if={item.isCurrentBeat}>
                                                        Inprogress
                                                        &nbsp;
                                                        <span class="icon-margin-bottom">
                                                            <lightning-icon icon-name="utility:clock" size="x-small"
                                                                alternative-text="" class="cloclColor">
                                                            </lightning-icon>
                                                        </span>
                                                    </template>
                                                    <template lwc:else>
                                                        Planned
                                                    </template>
                                                </div>
                                                <div class="outlet-title" style="padding-left:14px"> &nbsp;&nbsp; Date :
                                                    {item.pjpDate} </div>
                                            </div>
                                            <!--Left side Icons-->
                                            <div class="outlet-icon">
                                                <template if:false={isLeaveExisted}>
                                                    <template lwc:if={isDayStarted}>
                                                        <!-- Forward Icon for Current Beat -->
                                                        <template if:true={item.isCurrentBeat}>
                                                            <div class="icon-container">
                                                                <div onclick={handleOnclickMenu} data-id={item.beatId}
                                                                    data-pjpid={item.pjpId} data-index={index}
                                                                    data-name="Execute_Beat"
                                                                    data-beatname={item.beatName}>
                                                                    <img src={googleIcons.forward} width="23"
                                                                        height="23">
                                                                </div>
                                                            </div>
                                                        </template>

                                                        <!-- Play Icon Logic -->
                                                        <template if:false={item.isCurrentBeat}>
                                                            <!-- 1. Show Play for today beat when no current beat exists -->
                                                            <template if:true={item.istodayBeat}>
                                                                <template if:false={isCurrentBeatExisted}>
                                                                    <div class="icon-container">
                                                                        <div onclick={handleOnclickMenu}
                                                                            data-id={item.beatId}
                                                                            data-pjpid={item.pjpId} data-index={index}
                                                                            data-name="Start_Beat"
                                                                            data-beatname={item.beatName}>
                                                                            <img src={googleIcons.play} width="23"
                                                                                height="23">
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </template>

                                                            <!-- 2. Show Play for all beats if no current beat and no today beat exists -->
                                                            <template if:false={isCurrentBeatExisted}>
                                                                <template if:false={isTodayBeatExisted}>
                                                                    <div class="icon-container">
                                                                        <div onclick={handleOnclickMenu}
                                                                            data-id={item.beatId}
                                                                            data-pjpid={item.pjpId} data-index={index}
                                                                            data-name="Start_Beat"
                                                                            data-beatname={item.beatName}>
                                                                            <img src={googleIcons.play} width="23"
                                                                                height="23">
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </template>
                                                        </template>

                                                        <!-- Switch Icon Logic -->
                                                        <template if:false={item.isCurrentBeat}>
                                                            <!--this item is for Not today beat-->
                                                            <template if:false={item.istodayBeat}>
                                                                <!--If today beat any tday beat existed-->
                                                                <template if:true={isTodayBeatExisted}>
                                                                    <div class="icon-container">
                                                                        <div onclick={handleOnclickMenu}
                                                                            data-id={item.beatId}
                                                                            data-pjpid={item.pjpId} data-index={index}
                                                                            data-name="Switch_Beat"
                                                                            data-beatname={item.beatName}>
                                                                            <img src={googleIcons.switch} width="23"
                                                                                height="23">
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                                <!--If tofay any one today beat not existed but any one current beat existed-->
                                                                <template if:false={isTodayBeatExisted}>
                                                                    <template if:true={isCurrentBeatExisted}>
                                                                        <div class="icon-container">
                                                                            <div onclick={handleOnclickMenu}
                                                                                data-id={item.beatId}
                                                                                data-pjpid={item.pjpId}
                                                                                data-index={index}
                                                                                data-name="Switch_Beat"
                                                                                data-beatname={item.beatName}>
                                                                                <img src={googleIcons.switch} width="23"
                                                                                    height="23">
                                                                            </div>
                                                                        </div>
                                                                    </template>
                                                                </template>
                                                            </template>

                                                            <!--it today beat, but another beat is current -->
                                                            <template if:true={item.istodayBeat}>
                                                                <template if:true={isCurrentBeatExisted}>
                                                                    <div class="icon-container">
                                                                        <div onclick={handleOnclickMenu}
                                                                            data-id={item.beatId}
                                                                            data-pjpid={item.pjpId} data-index={index}
                                                                            data-name="Switch_Beat"
                                                                            data-beatname={item.beatName}>
                                                                            <img src={googleIcons.switch} width="23"
                                                                                height="23">
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </template>
                                                        </template>

                                                        <!-- <div onclick={openMenu} tabindex="0" data-id={item.id} data-index={index}>
                                                            <lightning-icon 
                                                                icon-name="utility:threedots_vertical" 
                                                                size="x-small" 
                                                                alternative-text="" 
                                                                class="chevron-icon-ex"
                                                                data-id={item.id}
                                                                data-index={index}>
                                                            </lightning-icon>
                                                    
                                                            <template lwc:if={item.openPopup}>
                                                                <div class="popup" >
                                                                    <ul>
                                                                        <li onclick={handleOnclickMenu} data-name="Preview"
                                                                        data-id={item.beatId} data-index={index}
                                                                                data-pjpid={item.pjpId}>
                                                                            <i class="material-symbols-outlined">
                                                                                <lightning-icon 
                                                                                    icon-name="utility:preview" 
                                                                                    size="x-small" 
                                                                                    alternative-text="Preview"
                                                                                    class="invert-image" >
                                                                                </lightning-icon>
                                                                            </i>
                                                                            Preview
                                                                        </li>
                                                                    </ul>
                                                                </div>
                                                            </template>
                                                        </div>-->
                                                    </template>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>
                        <template lwc:if={noBeatsFound}>
                            <div class="slds-align_absolute-center slds-m-top_medium">
                                <p class="slds-text-color_weak">No Beats Found</p>
                            </div>
                        </template>

                        <!-- ══════════════════════════════════
                                SHARED BEATS SECTION
                        ══════════════════════════════════ -->
                        <template lwc:if={hasSharedBeatData}>
                            <div class="shared-beats-section slds-m-top_medium">
                                <h3 class="shared-beats-header">
                                    <lightning-icon icon-name="utility:share" size="x-small" alternative-text="Shared"
                                        class="slds-m-right_x-small"></lightning-icon>
                                    Shared Beats
                                </h3>
                                <template for:each={sharedBeatData} for:item="item" for:index="index">
                                    <div class="route-outlets" key={item.uiKey}>
                                        <div class="borderLine slds-m-top_small">
                                            <div class="route-outlet">
                                                <div class="route-left">
                                                    <div class="outlet-title">
                                                        <span class="icon-wrapper">
                                                            <img src={googleIcons.beat} class="custom-icon" width="20"
                                                                height="20" />
                                                        </span>&nbsp;
                                                        <div class="beat-name-wrapper">
                                                            <b>{item.beatName}</b>
                                                        </div>
                                                    </div>
                                                    <div class="outlet-title" style="padding-left:14px">
                                                        &nbsp;&nbsp; Owner : &nbsp; {item.ownerName}
                                                    </div>
                                                </div>
                                                <div class="outlet-icon">
                                                    <template if:false={isLeaveExisted}>
                                                        <template lwc:if={isDayStarted}>
                                                            <!-- Start shared beat if no current beat exists -->
                                                            <template if:false={isCurrentBeatExisted}>
                                                                <div class="icon-container">
                                                                    <div onclick={handleOnclickMenu}
                                                                        data-id={item.beatId} data-pjpid={item.pjpId}
                                                                        data-index={index} data-name="Start_Beat"
                                                                        data-beatname={item.beatName}>
                                                                        <img src={googleIcons.play} width="23"
                                                                            height="23">
                                                                    </div>
                                                                </div>
                                                            </template>
                                                            <!-- Switch to shared beat if current beat exists -->
                                                            <template if:true={isCurrentBeatExisted}>
                                                                <div class="icon-container">
                                                                    <div onclick={handleOnclickMenu}
                                                                        data-id={item.beatId} data-pjpid={item.pjpId}
                                                                        data-index={index} data-name="Switch_Beat"
                                                                        data-beatname={item.beatName}>
                                                                        <img src={googleIcons.switch} width="23"
                                                                            height="23">
                                                                    </div>
                                                                </div>
                                                            </template>
                                                        </template>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </template>
                </template>

                <!--Visit Form Visits Tab-->
                <template lwc:if={visitFormTabActive}>
                    <template lwc:if={isPageLoaded}>
                        <div>
                            <c-on-loading-screen></c-on-loading-screen>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="visit-form-list-root">
                            <div class="route">
                                <div class="outside-beat-section">
                                    <!-- Search Bar -->
                                    <div class="route-filters">
                                        <lightning-input type="search" placeholder="Search Visits...."
                                            value={visitSearchTerm} onchange={handleSearch}
                                            class="slds-input_bare slds-border_none textField">
                                        </lightning-input>
                                    </div>

                                    <!-- Visit Cards -->
                                    <template for:each={visitForms} for:item="item" for:index="index">
                                        <div class="visit-card" key={item.Id}>
                                            <!-- Left: Icon + Info -->
                                            <div class="card-left">
                                                <div class="outlet-header">
                                                    <span class="icon-wrapper">
                                                        <img src={googleIcons.account} class="custom-icon" width="20"
                                                            height="20" />
                                                    </span>
                                                    <b class="account-name">{item.AccountName}</b>
                                                </div>
                                                <div class="card-meta">
                                                    <span class="meta-label">Status</span>
                                                    <span class="meta-sep">:</span>
                                                    <span class="meta-value">{item.Status}</span>
                                                    <template if:true={item.isInprogress}>
                                                        <span class="status-icon">&#9203;</span>
                                                    </template>
                                                </div>
                                                <div class="card-meta">
                                                    <span class="meta-label">Type</span>
                                                    <span class="meta-sep">:</span>
                                                    <span class="meta-value">{item.CustomerType}</span>
                                                </div>
                                                <div class="card-meta">
                                                    <span class="meta-label">Time</span>
                                                    <span class="meta-sep">:</span>
                                                    <span class="meta-value">{item.CreatedTime}</span>
                                                </div>
                                            </div>

                                            <!-- Right: Arrow -->
                                            <div class="card-arrow" onclick={handleOutsideVisitClick} data-id={item.Id}
                                                data-index={index}>
                                                <img src={googleIcons.forward} width="22" height="22" />
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </template>

                <!--Report View Tab — Reportee View-->
                <template lwc:if={reportTabActive}>
                    <template lwc:if={isLoadingReportees}>
                        <div>
                            <c-on-loading-screen></c-on-loading-screen>
                        </div>
                    </template>
                    <template lwc:else>

                        <!-- SUB-VIEW: Reportee's Beats (same style as My Beats) -->
                        <template lwc:if={isReporteeBeatView}>
                            <div class="reportee-beat-section">
                                <!-- Back button + Reportee Name header -->
                                <div class="reportee-beat-header">
                                    <div class="reportee-back-btn" onclick={handleBackToReportees}>
                                        <lightning-icon icon-name="utility:back" size="x-small"
                                            alternative-text="Back"></lightning-icon>
                                    </div>
                                    <span class="reportee-beat-title">{selectedReporteeName}'s Beats</span>
                                </div>

                                <!-- Loading -->
                                <template lwc:if={isLoadingReporteeBeats}>
                                    <div>
                                        <c-on-loading-screen></c-on-loading-screen>
                                    </div>
                                </template>
                                <template lwc:else>
                                    <!-- Search Bar -->
                                    <div class="route-filters">
                                        <lightning-input type="search" placeholder="Search Beats...."
                                            value={reporteeBeatSearchTerm} onchange={handleReporteeBeatSearch}
                                            class="slds-input_bare slds-border_none textField">
                                        </lightning-input>
                                    </div>

                                    <!-- Beat Cards (same format as My Beats) -->
                                    <template lwc:if={hasReporteeBeats}>
                                        <template for:each={reporteeBeats} for:item="beat" for:index="index">
                                            <div class="route-outlets" key={beat.uiKey}>
                                                <div class="borderLine slds-m-top_small">
                                                    <div class="route-outlet">
                                                        <!-- Beat Info (left side) -->
                                                        <div class="route-left">
                                                            <div class="outlet-title">
                                                                <span class="icon-wrapper">
                                                                    <img src={googleIcons.beat} class="custom-icon"
                                                                        width="20" height="20" />
                                                                </span>&nbsp;
                                                                <div class="beat-name-wrapper">
                                                                    <b>{beat.beatName}</b>
                                                                </div>
                                                            </div>
                                                            <div class="outlet-title" style="padding-left:14px">
                                                                &nbsp;&nbsp; Customer : {beat.primaryCustomerName}
                                                            </div>
                                                            <div class="outlet-title" style="padding-left:14px">
                                                                &nbsp;&nbsp; Outlets : {beat.outletCount} &bull; Type :
                                                                {beat.beatType}
                                                            </div>
                                                        </div>
                                                        <!-- Action Icon (right side) - only when day is started -->
                                                        <div class="outlet-icon">
                                                            <template if:false={isLeaveExisted}>
                                                                <template lwc:if={isDayStarted}>
                                                                    <!-- If current beat exists, show Switch icon -->
                                                                    <template lwc:if={isCurrentBeatExisted}>
                                                                        <div class="icon-container">
                                                                            <div onclick={handleReporteeBeatClick}
                                                                                data-beatid={beat.beatId}
                                                                                data-beatname={beat.beatName}
                                                                                data-action="Switch_Beat">
                                                                                <img src={googleIcons.switch} width="23"
                                                                                    height="23">
                                                                            </div>
                                                                        </div>
                                                                    </template>
                                                                    <!-- No current beat, show Play icon to Start -->
                                                                    <template lwc:else>
                                                                        <div class="icon-container">
                                                                            <div onclick={handleReporteeBeatClick}
                                                                                data-beatid={beat.beatId}
                                                                                data-beatname={beat.beatName}
                                                                                data-action="Start_Beat">
                                                                                <img src={googleIcons.play} width="23"
                                                                                    height="23">
                                                                            </div>
                                                                        </div>
                                                                    </template>
                                                                </template>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </template>
                                    <template lwc:else>
                                        <div class="slds-align_absolute-center slds-m-top_medium">
                                            <p class="slds-text-color_weak">No Beats Found for {selectedReporteeName}
                                            </p>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </template>

                        <!-- MAIN VIEW: Reportee List -->
                        <template lwc:else>
                            <div class="reportee-section">
                                <!-- Back to My Beats -->
                                <div class="reportee-beat-header">
                                    <div class="reportee-back-btn" onclick={handleBackToMyBeats}>
                                        <lightning-icon icon-name="utility:back" size="x-small"
                                            alternative-text="Back"></lightning-icon>
                                    </div>
                                    <span class="reportee-beat-title">Reportee View</span>
                                </div>

                                <!-- Search Bar -->
                                <div class="route-filters">
                                    <lightning-input type="search" placeholder="Search Reportees..."
                                        value={reporteeSearchTerm} onchange={handleReporteeSearch}
                                        class="slds-input_bare slds-border_none textField">
                                    </lightning-input>
                                </div>

                                <!-- Reportee Cards -->
                                <template lwc:if={hasReportees}>
                                    <template for:each={filteredReportees} for:item="reportee">
                                        <div class="reportee-card" key={reportee.userId} data-userid={reportee.userId}
                                            onclick={handleReporteeClick}>
                                            <!-- Left: Icon -->
                                            <div class="reportee-icon">
                                                <lightning-icon icon-name="utility:location" size="x-small"
                                                    alternative-text="Location"></lightning-icon>
                                            </div>
                                            <!-- Center: Info -->
                                            <div class="reportee-info">
                                                <div class="reportee-name">{reportee.name}</div>
                                                <div class="reportee-meta">Employee Code : {reportee.employeeCode}</div>
                                                <div class="reportee-meta">Role : <b>{reportee.roleName}</b></div>
                                                <div class="reportee-meta">Total Beats : <b>{reportee.beatCount}</b>
                                                </div>
                                                <div class="reportee-meta">
                                                    Status :
                                                    <template lwc:if={reportee.isActive}>
                                                        <span class="status-active">Active</span>
                                                    </template>
                                                    <template lwc:else>
                                                        <span class="status-inactive">Inactive</span>
                                                    </template>
                                                </div>
                                            </div>
                                            <!-- Right: Chevron -->
                                            <div class="reportee-chevron">
                                                <lightning-icon icon-name="utility:chevronright" size="x-small"
                                                    alternative-text="View"></lightning-icon>
                                            </div>
                                        </div>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <div class="slds-align_absolute-center slds-m-top_medium">
                                        <p class="slds-text-color_weak">No Reportees Found</p>
                                    </div>
                                </template>
                            </div>
                        </template>

                    </template>
                </template>

            </div>
        </div>
    </template>

    <!--Switch Beat Popup-->
    <template lwc:if={isShowSwitchBeat}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class={containerClass}>
                <template lwc:if={isDesktop}>
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={closePopup}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                </template>
                <div class="slds-modal__header">
                    <div class="slds-grid slds-gutters slds-grid_align-center slds-grid_vertical-align-center">
                        <template if:false={isDesktop}>
                            <div class="slds-col slds-clearfix mobile-button">
                                <div class="slds-float_right">
                                    <lightning-button variant="base" label="Cancel" disabled={isDisabled}
                                        onclick={closePopup} class="slds-m-left_x-small"></lightning-button>
                                </div>
                            </div>
                        </template>
                        <div class="slds-col slds-align_absolute-center mobile-header">
                            <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">Switch Beat
                            </h1>
                        </div>
                        <template if:false={isDesktop}>
                            <div class="slds-col slds-clearfix mobile-button">
                                <div class="slds-float_left">
                                    <lightning-button variant="base" label="Switch" disabled={isDisabled}
                                        onclick={switchBeat} class="slds-m-left_x-small"></lightning-button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <div class="slds-modal__content slds-p-around_medium visitPopup" id="modal-content-id-2">
                    <template lwc:if={isLoading}>
                        <div style="overflow: hidden;">
                            <c-loading-screen size={loadingScreenSize}></c-loading-screen>
                        </div>
                    </template>
                    <template lwc:else>
                        <lightning-textarea name="beatSwitchReason" label="Reason for Switching the Beat"
                            data-id="beatSwitchReason" value={beatSwitchReason}
                            placeholder="Enter Reason for Switching the Beat..." onchange={handleInputChange} required>
                        </lightning-textarea>
                    </template>
                </div>
                <template lwc:if={isDesktop}>
                    <div class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" aria-label="Cancel" onclick={closePopup}
                            disabled={isDisabled}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={switchBeat}
                            disabled={isDisabled}>Switch</button>
                    </div>
                </template>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>

    <!--Confirmation Modal-->
    <template if:true={isShowConfirmation}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header mobile-header" style="color: black;background-color:white">
                    <h2 id="modal-heading-02" class="slds-modal__title slds-hyphenate">Start Beat</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium centeralign" style="text-align: center;">
                    <template lwc:if={isLoading}>
                        <div style="overflow: hidden;">
                            <c-loading-screen size={loadingScreenSize}></c-loading-screen>
                        </div>
                    </template>
                    <template lwc:else>
                        Are you sure you want to start the beat?
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={handleConfirmationNo}>No</button>
                    <button class="slds-button slds-button_brand" onclick={handleConfirmationYes}>Yes</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
