<template>
    <div class="upload-wrapper slds-p-around_medium">
        <div class="upload-header slds-grid slds-grid_align-spread slds-wrap">
            <h3 class="upload-title">Upload Secondary Debit Notes</h3>
            <div class="upload-actions">
                <template if:true={isSelectView}>
                    <button class="actionButton" onclick={handleSampleDownload}>Download Sample CSV</button>
                </template>
                <button class="actionButton1" onclick={handleClose}>Close</button>
            </div>
        </div>

        <!-- Step 1: File Select -->
        <template if:true={isSelectView}>
            <div class="upload-body slds-p-around_medium">
                <div class="slds-grid slds-wrap slds-gutters">
                    <div class="slds-col slds-size_1-of-1 slds-p-around_small">
                        <label class="slds-form-element__label">Select CSV File</label>
                        <input type="file" accept=".csv,text/csv" onchange={handleFileChange} class="file-input" />
                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                            Required columns: Customer_Code, Note_Date (YYYY-MM-DD), Amount, Reason, Description.
                        </p>
                    </div>
                </div>
            </div>
        </template>

        <!-- Step 2: Preview -->
        <template if:true={isPreviewView}>
            <div class="upload-body slds-p-around_medium">
                <div class="slds-grid slds-grid_align-spread slds-wrap slds-m-bottom_small">
                    <div>
                        <p class="slds-text-body_regular"><strong>{fileName}</strong></p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            {totalRowCount} row(s) parsed. Showing first {previewDisplayCount}.
                        </p>
                    </div>
                    <div class="upload-actions">
                        <button class="actionButton" onclick={handleUpload} disabled={isUploading}>Upload Records</button>
                        <button class="actionButton1" onclick={handleBackToSelect} disabled={isUploading}>Choose Another File</button>
                    </div>
                </div>

                <div class="preview-table-wrap">
                    <table class="contacts-table preview-table">
                        <thead>
                            <tr>
                                <th style="width:6%;">Row</th>
                                <th style="width:18%;">Customer Code</th>
                                <th style="width:14%;">Date</th>
                                <th style="width:12%;">Amount</th>
                                <th style="width:20%;">Reason</th>
                                <th style="width:30%;">Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={previewDisplayRows} for:item="row">
                                <tr key={row.rowKey}>
                                    <td>{row.rowNumber}</td>
                                    <td>{row.customerCode}</td>
                                    <td>{row.noteDate}</td>
                                    <td>{row.amount}</td>
                                    <td>{row.reason}</td>
                                    <td>{row.description}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <template if:true={hasMoreRows}>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                        + {extraRowCount} more row(s) will be uploaded but are not shown in the preview.
                    </p>
                </template>

                <template if:true={isUploading}>
                    <div class="slds-p-around_medium slds-text-align_center">
                        <c-loading-screen></c-loading-screen>
                        <p class="slds-text-body_regular">Uploading records, please wait...</p>
                    </div>
                </template>
            </div>
        </template>

        <!-- Step 3: Result -->
        <template if:true={isResultView}>
            <div class="upload-body slds-p-around_medium">
                <div class="slds-grid slds-gutters slds-wrap result-cards">
                    <div class="slds-col slds-size_1-of-3">
                        <div class="result-card">
                            <p class="result-label">Total Records</p>
                            <p class="result-value">{result.totalRecords}</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <div class="result-card success-card">
                            <p class="result-label">Successful</p>
                            <p class="result-value">{result.successCount}</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <div class="result-card error-card">
                            <p class="result-label">Failed</p>
                            <p class="result-value">{result.failedCount}</p>
                        </div>
                    </div>
                </div>

                <template if:true={hasSuccesses}>
                    <h4 class="slds-text-heading_small slds-m-top_medium slds-m-bottom_x-small">Successful Records</h4>
                    <div class="preview-table-wrap">
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th style="width:8%;">Row No</th>
                                    <th style="width:15%;">Customer Code</th>
                                    <th style="width:22%;">Customer Name</th>
                                    <th style="width:18%;">Record Id</th>
                                    <th style="width:15%;">Debit Note No</th>
                                    <th style="width:12%;">Date</th>
                                    <th style="width:10%;">Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={result.successes} for:item="suc">
                                    <tr key={suc.recordId}>
                                        <td>{suc.rowNumber}</td>
                                        <td>{suc.customerCode}</td>
                                        <td>{suc.customerName}</td>
                                        <td>{suc.recordId}</td>
                                        <td>{suc.recordName}</td>
                                        <td>{suc.noteDate}</td>
                                        <td>{suc.amount}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <template if:true={hasErrors}>
                    <h4 class="slds-text-heading_small slds-m-top_medium slds-m-bottom_x-small">Failed Rows</h4>
                    <div class="preview-table-wrap">
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th style="width:6%;">Row No</th>
                                    <th style="width:13%;">Customer Code</th>
                                    <th style="width:11%;">Note Date</th>
                                    <th style="width:9%;">Amount</th>
                                    <th style="width:13%;">Reason</th>
                                    <th style="width:18%;">Description</th>
                                    <th style="width:30%;">Error Message</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={result.errors} for:item="err">
                                    <tr key={err.rowNumber}>
                                        <td>{err.rowNumber}</td>
                                        <td>{err.customerCode}</td>
                                        <td>{err.noteDate}</td>
                                        <td>{err.amount}</td>
                                        <td>{err.reason}</td>
                                        <td>{err.description}</td>
                                        <td class="error-text">{err.message}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <div class="slds-m-top_medium upload-actions">
                    <button class="actionButton" onclick={handleDownloadResult}>Download Result File</button>
                    <button class="actionButton" onclick={handleBackToSelect}>Upload Another File</button>
                    <button class="actionButton1" onclick={handleClose}>Close</button>
                </div>
            </div>
        </template>
    </div>
    <c-custom-toast auto-close-time="8000"></c-custom-toast>
</template>
