<template>
    <template lwc:if={isPageLoaded}>
        <div style="margin:40px">
            <c-on-loading-screen></c-on-loading-screen>
        </div>
    </template>

    <template lwc:else>
        <div class="orders layouts" id="NewDebitNoteLayout">
            <!-- Header Section -->
            <div class="order-head slds-grid slds-wrap slds-gutters slds-p-around_medium">
                <!-- Title -->
                <div class="slds-col slds-size_1-of-3">
                    <h3 class="order-title slds-text-heading_medium">New Debit Note</h3>
                </div>
                <!-- Customer Search -->
                <div class="slds-col slds-size_1-of-3">
                    <div style="position: relative;">
                        <lightning-input label="Secondary Customer" type="search" required
                            value={customerSearch} onchange={handleCustomerSearch}>
                        </lightning-input>
                        <template if:true={showCustomerSuggestions}>
                            <div class="suggestion-box" role="listbox">
                                <ul class="slds-listbox slds-listbox_vertical">
                                    <template for:each={filteredCustomers} for:item="cust">
                                        <li key={cust.value} class="slds-listbox__item">
                                            <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                onclick={selectCustomer} data-id={cust.value} style="cursor: pointer;">
                                                <span class="slds-media__figure slds-listbox__option-icon">
                                                    <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
                                                </span>
                                                <span class="slds-media__body">
                                                    <span class="slds-truncate" title={cust.label}>{cust.label}</span>
                                                </span>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- Action Buttons -->
                <div class="slds-col slds-size_1-of-3 slds-text-align_right">
                    <button class="actionButton" onclick={handleSave}>Save</button>
                    <button class="actionButton1 slds-m-left_small" onclick={handleCancel}>Cancel</button>
                </div>
            </div>
            <!-- Card Section -->
            <div class="slds-p-around_medium">
                <div class="slds-box" style="padding-bottom:250px">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <!-- Note Date (Auto-populated) -->
                        <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                            <lightning-input type="date" label="Note Date" value={noteDate} disabled>
                            </lightning-input>
                        </div>
                        <!-- Reason Picklist -->
                        <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                            <lightning-combobox name="reason" label="Reason" required value={reason}
                                placeholder="Select Reason" options={reasonOptions} onchange={handleReasonChange}>
                            </lightning-combobox>
                        </div>
                        <!-- Amount -->
                        <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                            <lightning-input type="number" label="Amount" required value={amount}
                                placeholder="Enter Amount" onchange={handleAmountChange} formatter="currency"
                                step="0.01">
                            </lightning-input>
                        </div>
                        <!-- Description -->
                        <div class="slds-col slds-size_2-of-3 slds-p-around_x-small">
                            <lightning-textarea label="Description" value={description}
                                placeholder="Enter description..." onchange={handleDescriptionChange}>
                            </lightning-textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
    <c-custom-toast auto-close-time="8000"></c-custom-toast>
</template>
