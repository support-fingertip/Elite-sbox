<template>
    <div class="rs-root">

        <!-- Header -->
        <div class="rs-header">
            <div class="rs-header-left">
                <span class="rs-icon">⚡</span>
                <div>
                    <h1 class="rs-title">Schemes</h1>
                    <p class="rs-subtitle">{totalSchemes} Active Schemes &bull; {totalProducts} Products</p>
                </div>
            </div>

            <div class="rs-header-right">
                <!-- Filter Buttons -->
                <div class="rs-filter-group">
                    <button class={lastMonthClass} onclick={handleFilterChange} data-filter="previous">Last Month</button>
                    <button class={currentMonthClass} onclick={handleFilterChange} data-filter="current">This Month</button>
                    <!--<button class={customClass} onclick={handleFilterChange} data-filter="custom">Custom</button>-->
                </div>

                <!-- Download Button -->
                <button class="rs-download-btn" onclick={handleDownload}>
                    ⬇ Download
                </button>
            </div>
        </div>

        <!-- Custom Date Range -->
        <template if:true={isCustom}>
            <div class="rs-custom-bar">
                <div class="rs-custom-field">
                    <label class="rs-custom-label">From Date</label>
                    <lightning-input type="date" value={customFromDate} onchange={handleFromDate} variant="label-hidden"></lightning-input>
                </div>
                <div class="rs-custom-field">
                    <label class="rs-custom-label">To Date</label>
                    <lightning-input type="date" value={customToDate} onchange={handleToDate} variant="label-hidden"></lightning-input>
                </div>
                <button class="rs-apply-btn" onclick={applyCustomFilter}>Apply</button>
            </div>
        </template>

        <!-- Date Range Info -->
        <div class="rs-date-bar">
            <span class="rs-date-label">📅 Showing schemes from</span>
            <span class="rs-date-range">{dateRangeLabel}</span>
        </div>

        <!-- Loading State -->
        <template if:true={isLoading}>
            <div style="margin:10px">
                <c-loading-screen></c-loading-screen>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={error}>
            <div class="rs-error">
                <span>⚠️</span>
                <p>{error}</p>
            </div>
        </template>

        <!-- Empty State -->
        <template if:true={isEmpty}>
            <div class="rs-empty">
                <div class="rs-empty-icon">📋</div>
                <p class="rs-empty-title">No schemes found</p>
                <p class="rs-empty-sub">Try switching to a different month.</p>
            </div>
        </template>

        <!-- Scheme Cards -->
        <template if:true={hasSchemes}>
            <div class="rs-scheme-list">
                <template for:each={schemes} for:item="scheme">
                    <div key={scheme.id} class="rs-scheme-card">

                        <!-- Scheme Header -->
                        <div class="rs-scheme-header" onclick={toggleScheme} data-id={scheme.id}>
                            <div class="rs-scheme-header-left">
                                <div class="rs-scheme-badge">{scheme.productCount} Products</div>
                                <div>
                                    <h2 class="rs-scheme-name">{scheme.name}</h2>
                                    <p class="rs-scheme-desc">{scheme.validLabel}</p>
                                </div>
                            </div>
                            <div class="rs-scheme-header-right">
                                <lightning-icon icon-name={scheme.expandIcon} size="x-small"></lightning-icon>
                            </div>
                        </div>

                        <!-- Scheme Body (same shape as the order Schemes tab) -->
                        <template if:true={scheme.isExpanded}>
                            <div class="coverage-scheme-card__body">
                                <div class="kv-row">
                                    <span class="kv-row__label">Scheme Type</span>
                                    <span class="kv-row__value">{scheme.schemeType}</span>
                                </div>
                                <template for:each={scheme.slabRows} for:item="r">
                                    <div key={r.label} class="kv-row kv-row--offer">
                                        <span class="kv-row__label">{r.label}</span>
                                        <span class="kv-row__value">{r.value}</span>
                                    </div>
                                </template>
                                <div class="kv-row">
                                    <span class="kv-row__label">Valid</span>
                                    <span class="kv-row__value">{scheme.validLabel}</span>
                                </div>
                                <template if:true={scheme.productCategory}>
                                    <div class="coverage-scheme-card__group">Category: {scheme.productCategory}</div>
                                </template>
                                <template if:true={scheme.productGroupName}>
                                    <div class="coverage-scheme-card__group">Group: {scheme.productGroupName}</div>
                                    <template for:each={scheme.products} for:item="p">
                                        <div key={p.id} class="coverage-scheme-product">
                                            <span class="coverage-scheme-product__name">{p.name}</span>
                                            <span class="coverage-scheme-product__sku">{p.sku}</span>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </template>

                    </div>
                </template>
            </div>
        </template>

        <!-- Hidden download anchor (LWC-safe) -->
        <a class="hidden-download-link" style="display:none;"></a>

    </div>
</template>
