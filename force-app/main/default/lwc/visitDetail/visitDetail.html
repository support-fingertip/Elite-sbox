<template>
    <template if:true={isLoading}>
        <div>
            <c-on-loading-screen></c-on-loading-screen>
        </div>
    </template>

    <template if:true={hasError}>
        <div class="error-state">
            <p>Unable to load visit details. Please try again.</p>
        </div>
    </template>

    <template if:false={isLoading}>
        <div class="detail-wrapper">
            <template if:true={visitRecord}>
                <div class="detail-content">

                    <!-- Customer Info Card -->
                    <div class="card">
                        <div class="card-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a73b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <span>Customer Information</span>
                        </div>
                        <div class="field-grid">
                            <div class="field-row">
                                <span class="field-label">Customer Name</span>
                                <span class="field-value">{visitRecord.Customer_Name__c}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Visit Info Card -->
                    <div class="card">
                        <div class="card-header">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a73b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            <span>Visit Information</span>
                        </div>
                        <div class="field-grid">
                            <div class="field-row">
                                <span class="field-label">Visit Date</span>
                                <span class="field-value">{formattedDate}</span>
                            </div>
                            <div class="field-row">
                                <span class="field-label">Visit Time</span>
                                <span class="field-value">{formattedTime}</span>
                            </div>
                            <div class="field-row">
                                <span class="field-label">Visit Type</span>
                                <span class="field-value">{visitRecord.Visit_Type__c}</span>
                            </div>
                            <div class="field-row">
                                <span class="field-label">Visited By</span>
                                <span class="field-value">{visitRecord.Owner.Name}</span>
                            </div>
                        </div>
                    </div>

                </div>
            </template>
        </div>
    </template>
</template>
