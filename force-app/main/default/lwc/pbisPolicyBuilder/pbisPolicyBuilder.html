<template>
    <div class="pbp-page">
        <div class="pbp-card">
            <!-- Header -->
            <div class="pbp-header">
                <div class="pbp-header-inner">
                    <div class="pbp-header-icon">
                        <lightning-icon icon-name="standard:strategy" size="small" variant="inverse"></lightning-icon>
                    </div>
                    <div>
                        <h1 class="pbp-title">{headerTitle}</h1>
                        <p class="pbp-subtitle">Channel-wise policy with per-profile incentive slabs</p>
                    </div>
                </div>
                <lightning-button-icon icon-name="utility:close" variant="bare-inverse" size="large"
                    alternative-text="Close" class="pbp-close" onclick={handleCancel}>
                </lightning-button-icon>
            </div>

            <!-- Body -->
            <div class="pbp-body">
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </template>

                <!-- Section: Policy -->
                <div class="pbp-section">
                    <p class="pbp-section-label">Policy</p>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-input label="Policy Name" data-field="Name" value={policy.Name}
                                onchange={handlePolicyField} required>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <lightning-combobox label="Basis" value={policy.Basis__c} options={basisOptions}
                                onchange={handleBasis}>
                            </lightning-combobox>
                        </div>
                    </div>
                    <div class="slds-m-top_small">
                        <lightning-input-rich-text label="Description" value={policy.Description__c}
                            onchange={handleDescription} placeholder="Enter the full policy details…">
                        </lightning-input-rich-text>
                    </div>
                </div>

                <!-- Section: Sales Channels (own block, separated from the toggle) -->
                <div class="pbp-section">
                    <p class="pbp-section-label">Sales Channels</p>
                    <lightning-dual-listbox name="channels" label="Sales Channels" variant="label-hidden"
                        source-label="Available" selected-label="Selected" options={channelOptions}
                        value={policy.Sales_Channels__c} onchange={handleChannels} required>
                    </lightning-dual-listbox>
                    <div class="pbp-active">
                        <lightning-input type="toggle" label="Active" message-toggle-active="Active"
                            message-toggle-inactive="Inactive" checked={policy.Is_Active__c} onchange={handleActive}>
                        </lightning-input>
                    </div>
                </div>

                <!-- Section: Incentive Slabs by Profile -->
                <div class="pbp-section pbp-section_last">
                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_x-small">
                        <p class="pbp-section-label slds-m-bottom_none">Incentive Slabs (per Profile)</p>
                        <lightning-button label="Add Profile" icon-name="utility:add" variant="brand"
                            onclick={addProfile}>
                        </lightning-button>
                    </div>

                    <template for:each={profiles} for:item="prof">
                        <div key={prof.key} class="pbp-profile-card">
                            <div class="pbp-profile-head">
                                <div class="pbp-profile-select">
                                    <lightning-combobox label="Profile" options={profileOptions}
                                        value={prof.Profile__c} data-key={prof.key} onchange={handleProfileChange}
                                        placeholder="Select profile" required>
                                    </lightning-combobox>
                                </div>
                                <div class="pbp-profile-actions">
                                    <lightning-button label="Clone" icon-name="utility:copy" variant="neutral"
                                        data-key={prof.key} onclick={cloneProfile} class="slds-m-right_x-small">
                                    </lightning-button>
                                    <lightning-button-icon icon-name="utility:delete" variant="border-filled"
                                        alternative-text="Remove profile" data-key={prof.key} onclick={removeProfile}>
                                    </lightning-button-icon>
                                </div>
                            </div>

                            <div class="pbp-slab-head slds-grid slds-gutters_x-small">
                                <div class="slds-col slds-size_1-of-12">Slab</div>
                                <div class="slds-col slds-size_3-of-12">From %</div>
                                <div class="slds-col slds-size_3-of-12">To %</div>
                                <div class="slds-col slds-size_2-of-12">Monthly %</div>
                                <div class="slds-col slds-size_2-of-12">Qtr %</div>
                                <div class="slds-col slds-size_1-of-12"></div>
                            </div>
                            <template for:each={prof.slabs} for:item="row">
                                <div key={row.key} class="slds-grid slds-gutters_x-small slds-grid_vertical-align-center pbp-slab-row">
                                    <div class="slds-col slds-size_1-of-12 pbp-slab-num">{row.Slab_Number__c}</div>
                                    <div class="slds-col slds-size_3-of-12">
                                        <lightning-input variant="label-hidden" type="number" step="0.01"
                                            value={row.Achievement_From__c} data-profile={prof.key} data-key={row.key}
                                            data-field="Achievement_From__c" onchange={handleSlabValue}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_3-of-12">
                                        <lightning-input variant="label-hidden" type="number" step="0.01"
                                            value={row.Achievement_To__c} data-profile={prof.key} data-key={row.key}
                                            data-field="Achievement_To__c" onchange={handleSlabValue}
                                            placeholder="(max)">
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_2-of-12">
                                        <lightning-input variant="label-hidden" type="number" step="0.01"
                                            value={row.Monthly_Incentive_Percent__c} data-profile={prof.key}
                                            data-key={row.key} data-field="Monthly_Incentive_Percent__c"
                                            onchange={handleSlabValue}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_2-of-12">
                                        <lightning-input variant="label-hidden" type="number" step="0.01"
                                            value={row.Quarterly_Incentive_Percent__c} data-profile={prof.key}
                                            data-key={row.key} data-field="Quarterly_Incentive_Percent__c"
                                            onchange={handleSlabValue}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-12 slds-text-align_center">
                                        <lightning-button-icon icon-name="utility:delete" variant="bare"
                                            alternative-text="Remove slab" data-profile={prof.key} data-key={row.key}
                                            onclick={removeSlab}>
                                        </lightning-button-icon>
                                    </div>
                                </div>
                            </template>
                            <div class="slds-m-top_x-small">
                                <lightning-button label="Add Slab" icon-name="utility:add" variant="base"
                                    data-key={prof.key} onclick={addSlab}>
                                </lightning-button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Footer -->
            <div class="pbp-footer">
                <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                <lightning-button variant="brand" label="Save" onclick={handleSave} disabled={isLoading}
                    class="slds-m-left_x-small">
                </lightning-button>
            </div>
        </div>
    </div>
</template>
