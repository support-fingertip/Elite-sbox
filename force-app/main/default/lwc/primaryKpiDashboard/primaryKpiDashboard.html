<template>
    <lightning-card title="Primary KPI Dashboard" icon-name="standard:dashboard">
        <lightning-button slot="actions" label="Refresh" icon-name="utility:refresh"
            onclick={handleRefresh}></lightning-button>

        <div class="slds-p-horizontal_small slds-p-bottom_medium kpi-root">

            <!-- Filters -->
            <div class="slds-grid slds-gutters_x-small slds-wrap slds-m-bottom_small">
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                    <lightning-input type="number" label="Year" value={year} onchange={handleYear}></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                    <lightning-combobox label="Month" value={month} options={monthOptions}
                        onchange={handleMonth}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                    <lightning-combobox label="Period" value={incentivePeriod} options={periodOptions}
                        onchange={handlePeriod}></lightning-combobox>
                </div>
                <template if:true={showViewControl}>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                        <lightning-combobox label="View" value={viewMode} options={viewModeOptions}
                            onchange={handleViewMode}></lightning-combobox>
                    </div>
                    <template if:true={isSearchView}>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <c-searchable-combobox label="User" placeholder="Search user…"
                                options={searchUserOptions} value={viewUserId}
                                onchange={handleUserSearch}></c-searchable-combobox>
                        </div>
                    </template>
                </template>
            </div>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <!-- Empty -->
            <template if:true={isEmpty}>
                <div class="slds-p-around_large slds-text-align_center">
                    <lightning-icon icon-name="utility:moneybag" alternative-text="Info"
                        size="medium" variant="warning"></lightning-icon>
                    <p class="slds-text-heading_small slds-m-top_small">No Primary PBIS for this period</p>
                    <p class="slds-text-body_regular slds-text-color_weak">
                        Pick another period, or check that targets are loaded and recalculated.
                    </p>
                </div>
            </template>

            <!-- My / User Search: personal detail -->
            <template if:true={showPersonalBlock}>
                <!-- Heading -->
                <div class="kpi-header slds-grid slds-grid_align-spread slds-grid_vertical-align-end slds-m-bottom_small slds-wrap">
                    <div>
                        <h2 class="slds-text-heading_medium">{personalHeading}</h2>
                        <p class="slds-text-color_weak">{heroSubHeading}</p>
                    </div>
                    <template if:true={isDrilled}>
                        <lightning-button label="Back to team" icon-name="utility:back"
                            onclick={handleBack}></lightning-button>
                    </template>
                </div>

                <!-- Hero KPI tiles: Total Incentive · Achievement · Eligibility -->
                <div class="slds-grid slds-gutters_x-small slds-wrap kpi-tiles slds-m-bottom_medium">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <div class="kpi-tile kpi-tile_incentive">
                            <div class="kpi-label">Total Incentive</div>
                            <div class="kpi-value">{heroTotalIncentive}</div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3">
                        <div class="kpi-tile kpi-tile_ach">
                            <div class="kpi-label">Achievement</div>
                            <div class="kpi-value"><span class={heroPctClass}>{heroPctText}</span></div>
                            <div class="kpi-progress">
                                <div class="kpi-progress-fill" style={heroProgressStyle}></div>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3">
                        <div class="kpi-tile kpi-tile_elig">
                            <div class="kpi-label">Eligibility</div>
                            <div class="kpi-value"><span class={heroEligibleClass}>{heroEligibleText}</span></div>
                        </div>
                    </div>
                </div>

                <!-- Per-parameter breakdown -->
                <div class="kpi-panel">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">S &amp; D Parameter breakdown</h3>
                    <template if:true={hasParameters}>
                        <template if:true={isMobile}>
                            <template for:each={parameters} for:item="p">
                                <div key={p.id} class="kpi-card kpi-card_static">
                                    <div class="kpi-card-head">
                                        <div>
                                            <div class="kpi-card-title">{p.parameter}</div>
                                            <div class="kpi-card-sub">Slab {p.slab}</div>
                                        </div>
                                        <span class={p.badgeClass}>{p.pctText}</span>
                                    </div>
                                    <div class="progress-track">
                                        <div class={p.barClass} style={p.barStyle}></div>
                                    </div>
                                    <div class="kpi-card-grid">
                                        <div>
                                            <div class="kpi-mini-label">Weight</div>
                                            <div class="kpi-mini-value">{p.weightage}%</div>
                                        </div>
                                        <div>
                                            <div class="kpi-mini-label">Target</div>
                                            <div class="kpi-mini-value">{p.targetText}</div>
                                        </div>
                                        <div>
                                            <div class="kpi-mini-label">Achievement</div>
                                            <div class="kpi-mini-value">{p.achText}</div>
                                        </div>
                                        <div>
                                            <div class="kpi-mini-label">Incentive</div>
                                            <div class="kpi-mini-value">{p.incentiveText}</div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>
                        <template if:false={isMobile}>
                            <lightning-datatable key-field="id" data={parameters} columns={paramColumns}
                                hide-checkbox-column column-widths-mode="auto"></lightning-datatable>
                        </template>
                    </template>
                    <template if:false={hasParameters}>
                        <p class="slds-text-body_regular slds-text-color_weak">No parameters on this target.</p>
                    </template>
                </div>
            </template>

            <!-- My view but no personal target -->
            <template if:true={noPersonalForMy}>
                <div class="kpi-panel slds-text-align_center slds-p-around_medium">
                    <p class="slds-text-body_regular slds-text-color_weak">
                        You have no Primary PBIS target for this period. Switch to "My Team" to see your team.
                    </p>
                </div>
            </template>

            <!-- User Search: selected user has no target -->
            <template if:true={noTargetForSelected}>
                <div class="kpi-panel slds-text-align_center slds-p-around_medium">
                    <lightning-icon icon-name="utility:moneybag" size="small" class="slds-m-bottom_x-small"></lightning-icon>
                    <p class="slds-text-body_regular slds-text-color_weak">
                        There are no Primary PBIS targets for this user in {data.periodLabel}.
                    </p>
                </div>
            </template>

            <!-- My Team -->
            <template if:true={showTeamBlock}>
                <!-- Team summary cards (like My view) -->
                <div class="kpi-header slds-grid slds-grid_align-spread slds-grid_vertical-align-end slds-m-bottom_small slds-wrap">
                    <div>
                        <h2 class="slds-text-heading_medium">My Team</h2>
                        <p class="slds-text-color_weak">{data.periodLabel}</p>
                    </div>
                </div>
                <div class="slds-grid slds-gutters_x-small slds-wrap kpi-tiles slds-m-bottom_medium">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="kpi-tile kpi-tile_incentive">
                            <div class="kpi-label">Total Team Incentive</div>
                            <div class="kpi-value">{teamTotalIncentiveText}</div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <div class="kpi-tile kpi-tile_ach">
                            <div class="kpi-label">Achievement</div>
                            <div class="kpi-value"><span class={teamPctClass}>{teamAchievementPctText}</span></div>
                            <div class="kpi-progress">
                                <div class="kpi-progress-fill" style={teamProgressStyle}></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="kpi-panel slds-m-top_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">Team members</h3>
                    <template if:true={hasTeam}>
                        <template if:true={isMobile}>
                            <template for:each={teamRows} for:item="u">
                                <div key={u.userId} class="kpi-card" data-id={u.userId} onclick={handleTeamCardClick}>
                                    <div class="kpi-card-head">
                                        <div>
                                            <div class="kpi-card-title">{u.userName}</div>
                                            <div class="kpi-card-sub">{u.role}</div>
                                        </div>
                                        <span class={u.badgeClass}>{u.pctText}</span>
                                    </div>
                                    <div class="progress-track">
                                        <div class={u.barClass} style={u.barStyle}></div>
                                    </div>
                                    <div class="kpi-card-grid">
                                        <div>
                                            <div class="kpi-mini-label">Incentive</div>
                                            <div class="kpi-mini-value">{u.incentiveText}</div>
                                        </div>
                                        <div>
                                            <div class="kpi-mini-label">Eligible</div>
                                            <div class="kpi-mini-value">{u.eligibleText}</div>
                                        </div>
                                    </div>
                                    <div class="kpi-card-cta">Tap to view this user
                                        <lightning-icon icon-name="utility:chevronright" size="xx-small"></lightning-icon>
                                    </div>
                                </div>
                            </template>
                        </template>
                        <template if:false={isMobile}>
                            <lightning-datatable key-field="userId" data={teamRows} columns={teamColumns}
                                hide-checkbox-column onrowaction={handleRowAction} column-widths-mode="auto"></lightning-datatable>
                        </template>
                    </template>
                    <template if:false={hasTeam}>
                        <p class="slds-text-body_regular slds-text-color_weak">No team targets for this period.</p>
                    </template>
                </div>

                <!-- Sales Channel wise -->
                <div class="kpi-panel slds-m-top_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">Sales Channel wise</h3>
                    <template if:true={hasChannels}>
                        <template for:each={channelRows} for:item="c">
                            <div key={c.label} class="kpi-bar-row">
                                <div class="kpi-bar-row-head">
                                    <span class="kpi-bar-label">{c.label}</span>
                                    <span class="kpi-bar-pct">{c.pctText}</span>
                                </div>
                                <div class="progress-track">
                                    <div class={c.barClass} style={c.barStyle}></div>
                                </div>
                                <div class="kpi-bar-row-meta">Incentive earned: {c.incentiveText}</div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasChannels}>
                        <p class="slds-text-body_regular slds-text-color_weak">No channel data.</p>
                    </template>
                </div>

                <!-- S&D Parameter wise -->
                <div class="kpi-panel slds-m-top_medium">
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">S &amp; D Parameter wise</h3>
                    <template if:true={hasParamBreakdown}>
                        <template for:each={paramBreakdownRows} for:item="p">
                            <div key={p.label} class="kpi-bar-row">
                                <div class="kpi-bar-row-head">
                                    <span class="kpi-bar-label">{p.label}</span>
                                    <span class="kpi-bar-pct">{p.pctText}</span>
                                </div>
                                <div class="progress-track">
                                    <div class={p.barClass} style={p.barStyle}></div>
                                </div>
                                <div class="kpi-bar-row-meta">Incentive earned: {p.incentiveText}</div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasParamBreakdown}>
                        <p class="slds-text-body_regular slds-text-color_weak">No parameter data.</p>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
