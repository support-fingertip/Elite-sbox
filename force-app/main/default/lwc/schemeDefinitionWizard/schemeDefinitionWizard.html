<template>
    <div class="wizard-wrapper">

        <!-- Top bar: brand + title + actions -->
        <div class="top-bar">
            <div class="top-bar__brand">
                <div class="top-bar__title-wrap">
                    <p class="top-bar__eyebrow">Scheme Definition</p>
                    <p class="top-bar__title">{pageTitle}</p>
                </div>
            </div>
            <div class="top-bar__divider"></div>

            <div class="top-bar__spacer"></div>

            <div class="top-bar__actions">
                <lightning-button
                    label="Cancel"
                    variant="neutral"
                    onclick={handleCancel}
                    disabled={isSaving}>
                </lightning-button>
                <lightning-button
                    label="Save"
                    variant="brand"
                    onclick={handleSave}
                    disabled={isSaveDisabled}>
                </lightning-button>
            </div>
        </div>

        <!-- Loading veil -->
        <template if:true={isHydrating}>
            <div class="card hydrating">
                <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
                <span>Loading scheme…</span>
            </div>
        </template>

        <!-- ============ CARD 1 — MASTER ============ -->
        <div class="card step-card">
            <h2 class="card__title">Master Details</h2>
            <div class="grid-2col">
                <div>
                    <lightning-input
                        label="Scheme Name"
                        data-field="name"
                        value={master.name}
                        max-length="255"
                        required
                        onchange={handleMasterChange}>
                    </lightning-input>
                </div>
                <div>
                    <lightning-combobox
                        label="Sales Channel"
                        data-field="salesChannel"
                        value={master.salesChannel}
                        options={salesChannelOptions}
                        placeholder="Select…"
                        required
                        onchange={handleMasterChange}>
                    </lightning-combobox>
                </div>
            </div>

            <div class="grid-1col">
                <lightning-radio-group
                    label="Scheme Type"
                    data-field="schemeType"
                    value={master.schemeType}
                    options={schemeTypeOptions}
                    type="radio"
                    required
                    onchange={handleMasterChange}>
                </lightning-radio-group>
            </div>

            <div class="grid-2col">
                <div>
                    <lightning-input
                        label="Scheme Start Date"
                        type="date"
                        data-field="startDate"
                        value={master.startDate}
                        min={startDateMin}
                        disabled={isStartDateReadOnly}
                        required
                        onchange={handleMasterChange}>
                    </lightning-input>
                </div>
                <div>
                    <lightning-input
                        label="Scheme End Date"
                        type="date"
                        data-field="endDate"
                        value={master.endDate}
                        min={endDateMin}
                        required
                        onchange={handleMasterChange}>
                    </lightning-input>
                </div>
            </div>

            <div class="grid-2col">
                <div>
                    <lightning-input
                        type="toggle"
                        label="Active"
                        message-toggle-active="Active"
                        message-toggle-inactive="Inactive"
                        checked={master.isActive}
                        onchange={handleActiveToggle}>
                    </lightning-input>
                </div>
                <div></div>
            </div>

            <div class="grid-1col">
                <lightning-textarea
                    label="Description"
                    data-field="description"
                    value={master.description}
                    onchange={handleMasterChange}>
                </lightning-textarea>
            </div>
        </div>

        <!-- ============ CARD 2 — LINKAGE ============ -->
        <div class="card step-card">
            <h2 class="card__title">Product Group / Category</h2>

            <template if:true={showLinkagePlaceholder}>
                <div class="empty-card">
                    <div class="empty-card__icon">
                        <lightning-icon icon-name="utility:apex" size="medium" variant="inverse"></lightning-icon>
                    </div>
                    <p class="empty-card__title">Pick Scheme Type and Sales Channel first</p>
                    <p class="empty-card__sub">Linkage options unlock once both are set above.</p>
                </div>
            </template>

            <template if:true={showGroupPicker}>
                <p class="hint">
                    Showing active Scheme Product Groups for channel
                    <strong>{master.salesChannel}</strong> with purpose
                    <strong>{expectedGroupPurpose}</strong>.
                </p>

                <template if:true={linkage.productGroupId}>
                    <div class="selected-row">
                        <div class="selected-pill-box">
                            <lightning-icon icon-name="utility:success" size="x-small" variant="success"></lightning-icon>
                            <span>{linkage.productGroupName}</span>
                        </div>
                        <lightning-button
                            label="Change"
                            variant="neutral"
                            onclick={handleClearGroup}>
                        </lightning-button>
                    </div>
                </template>

                <template if:false={linkage.productGroupId}>
                    <div class="search-row">
                        <lightning-input
                            type="search"
                            label="Search Scheme Product Groups"
                            placeholder="Type to search by name…"
                            onchange={handleProductGroupSearchInput}>
                        </lightning-input>
                        <template if:true={isSearchingGroups}>
                            <lightning-spinner alternative-text="Searching…" size="small"></lightning-spinner>
                        </template>
                    </div>
                    <div class="result-list">
                        <template for:each={productGroupResults} for:item="row">
                            <div key={row.id}
                                 data-id={row.id}
                                 class="result-item"
                                 onclick={handleProductGroupPick}>
                                <div class="result-item__name">{row.name}</div>
                                <div class="result-item__meta">{row.salesChannel} · {row.groupPurpose}</div>
                            </div>
                        </template>
                    </div>
                </template>
            </template>

            <template if:true={showCategoryPicker}>
                <p class="hint">Select the product category whose GSV drives the slab.</p>
                <lightning-combobox
                    label="Scheme Product Category"
                    value={linkage.productCategory}
                    options={productCategoryOptions}
                    placeholder="Select category…"
                    required
                    onchange={handleCategoryChange}>
                </lightning-combobox>
            </template>

            <template if:true={showNoLinkageHint}>
                <div class="info-box">
                    <lightning-icon icon-name="utility:info" size="small" variant="inverse"></lightning-icon>
                    <div>
                        <p class="info-box__title">No product linkage required.</p>
                        <p class="info-box__sub">Order Value schemes apply to the order's overall GSV.</p>
                    </div>
                </div>
            </template>
        </div>

        <!-- ============ CARD 3 — SLABS ============ -->
        <div class="card step-card">
            <h2 class="card__title">Slab Definition</h2>

            <template if:true={showSlabsPlaceholder}>
                <div class="empty-card">
                    <div class="empty-card__icon">
                        <lightning-icon icon-name="utility:rows" size="medium" variant="inverse"></lightning-icon>
                    </div>
                    <p class="empty-card__title">Pick Scheme Type and Sales Channel first</p>
                    <p class="empty-card__sub">Slab columns adjust to the selected scheme type.</p>
                </div>
            </template>

            <template if:true={showSlabsTable}>
                <!-- Free Quantity -->
                <template if:true={isFreeQty}>
                    <table class="slab-table">
                        <thead>
                            <tr>
                                <th class="col-sno">#</th>
                                <th>Min Qty</th>
                                <th>Max Qty</th>
                                <th>Free Qty</th>
                                <th class="col-action"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displaySlabs} for:item="s">
                                <tr key={s._uid} class="slab-row">
                                    <td class="col-sno">{s.sNo}</td>
                                    <td><lightning-input variant="label-hidden" label="Min" type="number" data-uid={s._uid} data-field="qtyMin" value={s.qtyMin} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="Max" type="number" data-uid={s._uid} data-field="qtyMax" value={s.qtyMax} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="Free" type="number" data-uid={s._uid} data-field="freeQty" value={s.freeQty} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td class="col-action">
                                        <template if:true={s.showRemove}>
                                            <lightning-button-icon icon-name="utility:delete" alternative-text="Remove" data-uid={s._uid} onclick={handleRemoveSlab}></lightning-button-icon>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <!-- QPS -->
                <template if:true={isQps}>
                    <table class="slab-table">
                        <thead>
                            <tr>
                                <th class="col-sno">#</th>
                                <th>Min Qty</th>
                                <th>Max Qty</th>
                                <th>Benefit ₹/EA</th>
                                <th class="col-action"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displaySlabs} for:item="s">
                                <tr key={s._uid} class="slab-row">
                                    <td class="col-sno">{s.sNo}</td>
                                    <td><lightning-input variant="label-hidden" label="Min" type="number" data-uid={s._uid} data-field="qtyMin" value={s.qtyMin} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="Max" type="number" data-uid={s._uid} data-field="qtyMax" value={s.qtyMax} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="Per EA" type="number" data-uid={s._uid} data-field="benefitPerEa" value={s.benefitPerEa} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td class="col-action">
                                        <template if:true={s.showRemove}>
                                            <lightning-button-icon icon-name="utility:delete" alternative-text="Remove" data-uid={s._uid} onclick={handleRemoveSlab}></lightning-button-icon>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <!-- FOC Giveaway -->
                <template if:true={isFoc}>
                    <template if:true={isLoadingFocSkus}>
                        <p class="hint">Loading FOC products for channel <strong>{master.salesChannel}</strong>…</p>
                    </template>
                    <table class="slab-table">
                        <thead>
                            <tr>
                                <th class="col-sno">#</th>
                                <th>Min Qty</th>
                                <th>Max Qty</th>
                                <th class="col-foc">FOC Product</th>
                                <th>Free Qty</th>
                                <th class="col-action"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displaySlabs} for:item="s">
                                <tr key={s._uid} class="slab-row">
                                    <td class="col-sno">{s.sNo}</td>
                                    <td><lightning-input variant="label-hidden" label="Min" type="number" data-uid={s._uid} data-field="qtyMin" value={s.qtyMin} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="Max" type="number" data-uid={s._uid} data-field="qtyMax" value={s.qtyMax} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td class="col-foc">
                                        <template if:true={s.hasFocPick}>
                                            <div class="foc-pick">
                                                <span class="foc-pick__name" title={s.focProductName}>{s.focProductName}</span>
                                                <lightning-button-icon
                                                    icon-name="utility:close"
                                                    alternative-text="Change"
                                                    size="small"
                                                    variant="bare"
                                                    data-uid={s._uid}
                                                    onclick={handleClearFocProduct}>
                                                </lightning-button-icon>
                                            </div>
                                        </template>
                                        <template if:true={s.showFocSearch}>
                                            <div class="foc-search">
                                                <lightning-input
                                                    type="search"
                                                    variant="label-hidden"
                                                    label="Search FOC Product"
                                                    placeholder="Search by name or SKU…"
                                                    data-uid={s._uid}
                                                    onfocus={handleFocSearchFocus}
                                                    onchange={handleFocSearchInput}>
                                                </lightning-input>
                                                <template if:true={s.showFocResults}>
                                                    <div class="foc-result-list">
                                                        <template for:each={s.focResults} for:item="p">
                                                            <div key={p.id}
                                                                 class="foc-result-item"
                                                                 data-uid={s._uid}
                                                                 data-id={p.id}
                                                                 onclick={handleFocProductPick}>
                                                                <span class="foc-result-item__name">{p.name}</span>
                                                                <template if:true={p.skuCode}>
                                                                    <span class="foc-result-item__sku">{p.skuCode}</span>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </td>
                                    <td><lightning-input variant="label-hidden" label="Free Qty" type="number" data-uid={s._uid} data-field="freeQty" value={s.freeQty} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td class="col-action">
                                        <template if:true={s.showRemove}>
                                            <lightning-button-icon icon-name="utility:delete" alternative-text="Remove" data-uid={s._uid} onclick={handleRemoveSlab}></lightning-button-icon>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <!-- Order Value -->
                <template if:true={isOrderValue}>
                    <table class="slab-table">
                        <thead>
                            <tr>
                                <th class="col-sno">#</th>
                                <th>Min Value (₹)</th>
                                <th>Max Value (₹)</th>
                                <th>Discount %</th>
                                <th class="col-action"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displaySlabs} for:item="s">
                                <tr key={s._uid} class="slab-row">
                                    <td class="col-sno">{s.sNo}</td>
                                    <td><lightning-input variant="label-hidden" label="From" type="number" data-uid={s._uid} data-field="valueMin" value={s.valueMin} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="To" type="number" data-uid={s._uid} data-field="valueMax" value={s.valueMax} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="%" type="number" step="0.01" data-uid={s._uid} data-field="benefitPercent" value={s.benefitPercent} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td class="col-action">
                                        <template if:true={s.showRemove}>
                                            <lightning-button-icon icon-name="utility:delete" alternative-text="Remove" data-uid={s._uid} onclick={handleRemoveSlab}></lightning-button-icon>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <!-- Category Value -->
                <template if:true={isCategoryValue}>
                    <table class="slab-table">
                        <thead>
                            <tr>
                                <th class="col-sno">#</th>
                                <th>Min Value (₹)</th>
                                <th>Max Value (₹)</th>
                                <th>Discount %</th>
                                <th class="col-action"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={displaySlabs} for:item="s">
                                <tr key={s._uid} class="slab-row">
                                    <td class="col-sno">{s.sNo}</td>
                                    <td><lightning-input variant="label-hidden" label="From" type="number" data-uid={s._uid} data-field="valueMin" value={s.valueMin} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="To" type="number" data-uid={s._uid} data-field="valueMax" value={s.valueMax} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td><lightning-input variant="label-hidden" label="%" type="number" step="0.01" data-uid={s._uid} data-field="benefitPercent" value={s.benefitPercent} onchange={handleSlabFieldChange}></lightning-input></td>
                                    <td class="col-action">
                                        <template if:true={s.showRemove}>
                                            <lightning-button-icon icon-name="utility:delete" alternative-text="Remove" data-uid={s._uid} onclick={handleRemoveSlab}></lightning-button-icon>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <div class="table-actions">
                    <lightning-button
                        label="Add Slab"
                        icon-name="utility:add"
                        variant="neutral"
                        onclick={handleAddSlab}>
                    </lightning-button>
                </div>
            </template>
        </div>

        <!-- Footer chip -->
        <div class="chip-wrap">
            <span class={inlineMessage.cls}>{inlineMessage.text}</span>
        </div>

        <template if:true={isSaving}>
            <lightning-spinner alternative-text="Saving…" size="medium"></lightning-spinner>
        </template>

    </div>
</template>
