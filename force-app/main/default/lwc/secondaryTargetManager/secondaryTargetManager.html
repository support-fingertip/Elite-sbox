<template>
    <lightning-card title="Secondary Targets" icon-name="standard:goals">
        <lightning-button slot="actions" label="Export" icon-name="utility:save"
            onclick={handleExport} class="slds-m-right_x-small"></lightning-button>
        <lightning-button slot="actions" label="Download Template" icon-name="utility:download"
            onclick={handleDownloadTemplate} class="slds-m-right_x-small"></lightning-button>
        <lightning-button slot="actions" label="Import CSV" icon-name="utility:upload"
            onclick={openFilePicker} class="slds-m-right_x-small"></lightning-button>
        <lightning-button slot="actions" label="New Target" icon-name="utility:add"
            onclick={handleNew} class="slds-m-right_x-small"></lightning-button>
        <lightning-button slot="actions" label="Recalculate All" icon-name="utility:refresh"
            variant="brand" onclick={handleRecalcAll}></lightning-button>

        <input type="file" accept=".csv,text/csv" class="csv-file-input"
            style="display:none;" onchange={handleImportFile} />
        <a class="csv-download-link" style="display:none;"></a>

        <div class="slds-p-horizontal_medium">
            <!-- summary tiles -->
            <div class="slds-grid slds-gutters slds-m-bottom_small slds-wrap">
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-box slds-box_x-small slds-text-align_center">
                        <div class="slds-text-title">Total</div>
                        <div class="slds-text-heading_medium">{totalCount}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-box slds-box_x-small slds-text-align_center">
                        <div class="slds-text-title">Active</div>
                        <div class="slds-text-heading_medium">{activeCount}</div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-box slds-box_x-small slds-text-align_center">
                        <div class="slds-text-title">Avg % Achievement</div>
                        <div class="slds-text-heading_medium">{avgAchievement}%</div>
                    </div>
                </div>
            </div>

            <!-- filters -->
            <div class="slds-grid slds-gutters slds-grid_vertical-align-end slds-m-bottom_small slds-wrap">
                <div class="slds-col slds-size_1-of-3">
                    <lightning-combobox label="Filter by Criteria" value={selectedCriteria}
                        options={criteriaOptions} onchange={handleCriteriaFilter}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-3 slds-is-relative">
                    <label class="slds-form-element__label">Filter by User</label>
                    <lightning-input variant="label-hidden" value={filterUserLabel}
                        onchange={handleFilterUserSearch}
                        placeholder="Type to search active users (blank = all)"></lightning-input>
                    <template if:true={showFilterUserResults}>
                        <ul class="slds-dropdown slds-dropdown_fluid slds-dropdown_length-5" role="listbox">
                            <template for:each={filterUserResults} for:item="u">
                                <li key={u.value} class="slds-listbox__item" role="presentation">
                                    <div class="slds-media slds-listbox__option slds-listbox__option_plain"
                                        data-value={u.value} data-label={u.label}
                                        onclick={handleFilterUserSelect}>
                                        {u.label}
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template if:true={filterUserId}>
                        <p class="slds-text-body_small slds-m-top_xx-small">
                            <a onclick={handleFilterUserClear}>Clear user filter</a>
                        </p>
                    </template>
                </div>
                <div class="slds-col slds-size_1-of-6 slds-p-bottom_x-small">
                    <lightning-input type="checkbox" label="Active only"
                        checked={activeOnly} onchange={handleActiveToggle}></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-6 slds-text-align_right slds-p-bottom_x-small">
                    <lightning-button label="Refresh" icon-name="utility:refresh"
                        onclick={handleRefresh}></lightning-button>
                </div>
            </div>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>

            <template if:true={hasRows}>
                <lightning-datatable key-field="Id" data={rows} columns={columns}
                    hide-checkbox-column onrowaction={handleRowAction}></lightning-datatable>
            </template>

            <template if:false={hasRows}>
                <div class="slds-illustration slds-illustration_small slds-p-around_large slds-text-align_center">
                    <p class="slds-text-body_regular">No secondary targets found. Click "New Target" to create one.</p>
                </div>
            </template>
        </div>
    </lightning-card>

    <!-- create / edit modal -->
    <template if:true={showForm}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={handleCloseForm}>
                        <lightning-icon icon-name="utility:close" size="small"
                            variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">{formTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-2">
                            <!-- User typeahead -->
                            <div class="slds-form-element slds-m-bottom_x-small slds-is-relative">
                                <label class="slds-form-element__label">User</label>
                                <lightning-input variant="label-hidden" data-field="userLabel"
                                    value={form.userLabel} onchange={handleUserSearch}
                                    placeholder="Type to search active users"></lightning-input>
                                <template if:true={showUserResults}>
                                    <ul class="slds-dropdown slds-dropdown_fluid slds-dropdown_length-5" role="listbox">
                                        <template for:each={userResults} for:item="u">
                                            <li key={u.value} class="slds-listbox__item" role="presentation">
                                                <div class="slds-media slds-listbox__option slds-listbox__option_plain"
                                                    data-value={u.value} data-label={u.label}
                                                    onclick={handleSelectUser}>
                                                    {u.label}
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </div>

                            <lightning-combobox label="Target Criteria" value={form.Target_Criteria__c}
                                options={formCriteriaOptions} onchange={handleCriteriaChange}
                                required class="slds-m-bottom_x-small"></lightning-combobox>

                            <template if:true={isFocusPackCriteria}>
                                <lightning-combobox label="Focus Pack" data-field="Focused_Pack__c"
                                    value={form.Focused_Pack__c} options={focusPackOptions}
                                    onchange={handleFormField} required
                                    field-level-help="Required for Focus-Pack criteria: the pack whose SKUs and minimum quantity drive this target."
                                    class="slds-m-bottom_x-small"></lightning-combobox>
                            </template>

                            <lightning-combobox label="Sales Channel" data-field="Sales_Channel__c"
                                value={form.Sales_Channel__c} options={channelOptions}
                                onchange={handleFormField} class="slds-m-bottom_x-small"></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input type="number" label="Target Value" data-field="Target_Value__c"
                                value={form.Target_Value__c} onchange={handleFormField}
                                class="slds-m-bottom_x-small"></lightning-input>
                            <lightning-input type="number" label="Year" data-field="Year__c"
                                value={form.Year__c} onchange={handleFormField}
                                class="slds-m-bottom_x-small"></lightning-input>
                            <lightning-input type="date" label="Start Date" data-field="Start_Date__c"
                                value={form.Start_Date__c} onchange={handleFormField}
                                required class="slds-m-bottom_x-small"></lightning-input>
                            <lightning-input type="date" label="End Date" data-field="End_Date__c"
                                value={form.End_Date__c} onchange={handleFormField}
                                required class="slds-m-bottom_x-small"></lightning-input>
                            <lightning-input type="checkbox" label="Is Active" data-field="Is_Active__c"
                                checked={form.Is_Active__c} onchange={handleFormField}></lightning-input>
                        </div>
                    </div>
                    <div class="slds-m-top_medium slds-text-align_right">
                        <lightning-button label="Cancel" onclick={handleCloseForm}
                            class="slds-m-right_x-small"></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={handleSaveForm}></lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showExplain}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={handleCloseExplain}>
                        <lightning-icon icon-name="utility:close" size="small"
                            variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">Achievement Breakdown</h2>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                        How {explain.targetName} for {explain.userName} was calculated.
                    </p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-box slds-box_x-small slds-m-bottom_medium">
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2">
                                <dl class="slds-dl_horizontal">
                                    <dt class="slds-dl_horizontal__label">Criterion</dt>
                                    <dd class="slds-dl_horizontal__detail">{explain.criterionName}</dd>
                                    <dt class="slds-dl_horizontal__label">Source Object</dt>
                                    <dd class="slds-dl_horizontal__detail">{explain.sourceObject}</dd>
                                    <dt class="slds-dl_horizontal__label">Date Field</dt>
                                    <dd class="slds-dl_horizontal__detail">{explain.dateField}</dd>
                                    <dt class="slds-dl_horizontal__label">User Field</dt>
                                    <dd class="slds-dl_horizontal__detail">{explain.userField}</dd>
                                    <template if:true={explain.focusPackName}>
                                        <dt class="slds-dl_horizontal__label">Focus Pack</dt>
                                        <dd class="slds-dl_horizontal__detail">{explain.focusPackName}</dd>
                                    </template>
                                </dl>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <dl class="slds-dl_horizontal">
                                    <dt class="slds-dl_horizontal__label">Operator</dt>
                                    <dd class="slds-dl_horizontal__detail">
                                        <span class="slds-badge slds-badge_lightest">{explain.operator}</span>
                                    </dd>
                                    <dt class="slds-dl_horizontal__label">Period</dt>
                                    <dd class="slds-dl_horizontal__detail">
                                        <lightning-formatted-date-time value={explain.startDate}
                                            year="numeric" month="short" day="2-digit"></lightning-formatted-date-time>
                                        &nbsp;–&nbsp;
                                        <lightning-formatted-date-time value={explain.endDate}
                                            year="numeric" month="short" day="2-digit"></lightning-formatted-date-time>
                                    </dd>
                                    <dt class="slds-dl_horizontal__label">Working Days</dt>
                                    <dd class="slds-dl_horizontal__detail">{explain.workingDays}</dd>
                                    <dt class="slds-dl_horizontal__label">Achievement Value</dt>
                                    <dd class="slds-dl_horizontal__detail">
                                        <strong>{explain.achievementValue}</strong>
                                    </dd>
                                    <template if:true={explain.focusPackName}>
                                        <dt class="slds-dl_horizontal__label">Minimum Qualifying Qty</dt>
                                        <dd class="slds-dl_horizontal__detail">{explain.minQualifyingQty}</dd>
                                    </template>
                                </dl>
                            </div>
                        </div>
                    </div>

                    <template if:true={explainFilters}>
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">Filters applied</h3>
                        <ul class="slds-list_dotted slds-m-bottom_medium">
                            <template for:each={explainFilters} for:item="f">
                                <li key={f.id}><code>{f.text}</code></li>
                            </template>
                        </ul>
                    </template>

                    <template if:true={explainSteps}>
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">Calculation steps</h3>
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-m-bottom_medium">
                            <tbody>
                                <template for:each={explainSteps} for:item="s">
                                    <tr key={s.id}>
                                        <td style="width: 45%;"><strong>{s.label}</strong></td>
                                        <td>{s.value}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>

                    <template if:true={explainPerDay}>
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">Per-day breakdown</h3>
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-m-bottom_medium">
                            <thead>
                                <tr class="slds-text-title_caps">
                                    <th>Day</th>
                                    <template if:true={explainIsTlsd}>
                                        <th class="slds-text-align_right">Lines</th>
                                        <th class="slds-text-align_right">Distinct Orders</th>
                                        <th class="slds-text-align_right">Lines ÷ Orders</th>
                                    </template>
                                    <template if:true={explainIsDailyUnique}>
                                        <th class="slds-text-align_right">Distinct Outlets</th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={explainPerDay} for:item="r">
                                    <tr key={r.id}>
                                        <td>{r.day}</td>
                                        <template if:true={explainIsTlsd}>
                                            <td class="slds-text-align_right">{r.count1}</td>
                                            <td class="slds-text-align_right">{r.count2}</td>
                                            <td class="slds-text-align_right"><strong>{r.value}</strong></td>
                                        </template>
                                        <template if:true={explainIsDailyUnique}>
                                            <td class="slds-text-align_right"><strong>{r.count1}</strong></td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>

                    <template if:true={explain.formula}>
                        <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_medium">
                            <span class="tcb-detail-label">Final calculation</span>
                            <div class="slds-text-heading_small slds-m-top_x-small">
                                <code>{explain.formula}</code>
                            </div>
                        </div>
                    </template>

                    <template if:true={explainPackSkus}>
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">Pack SKUs ({explain.packSkus.length})</h3>
                        <ul class="slds-list_dotted slds-m-bottom_medium">
                            <template for:each={explainPackSkus} for:item="s">
                                <li key={s.id}>{s.name}</li>
                            </template>
                        </ul>
                    </template>

                    <div class="slds-text-align_right">
                        <lightning-button variant="brand" label="Close" onclick={handleCloseExplain}></lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showImportResults}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={handleCloseImportResults}>
                        <lightning-icon icon-name="utility:close" size="small"
                            variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">Import Results</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p><strong>Created:</strong> {importCreated}</p>
                    <p><strong>Updated:</strong> {importUpdated}</p>
                    <template if:true={hasImportErrors}>
                        <h3 class="slds-text-heading_small slds-m-top_medium slds-text-color_error">
                            Errors ({importErrorCount}):
                        </h3>
                        <ul class="slds-list_dotted slds-m-top_x-small slds-scrollable_y"
                            style="max-height: 18rem;">
                            <template for:each={importErrors} for:item="err">
                                <li key={err.id}>{err.message}</li>
                            </template>
                        </ul>
                    </template>
                    <div class="slds-text-align_right slds-m-top_medium">
                        <lightning-button variant="brand" label="Close"
                            onclick={handleCloseImportResults}></lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
