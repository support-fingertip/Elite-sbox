<template>
    <div class="custom1">
        <div class="root">
            <div class="container">
                <div class="navbar first-div">
                    <!--<img src={dmsIcon} alt="navbar-img" class="nav-img" />-->
                    <div style="visibility: hidden;" class="nav-img"></div>
                    <ul class="nav-items-measure" aria-hidden="true">
                        <template for:each={allTabs} for:item="tab">
                            <li key={tab.id} class="nav-item">{tab.label}</li>
                        </template>
                        <li class="more-button-measure">More ▼</li>
                    </ul>
                    <div class="nav-items">
                        <template for:each={primaryTabs} for:item="tab">
                            <li key={tab.id} data-id={tab.id} class={tab.cssClass} onclick={selectTab}>
                                {tab.label}
                            </li>
                        </template>

                        <template if:true={hasOverflow}>
                            <div class="more-dropdown">
                                <button class="more-button" onclick={toggleMoreMenu}>
                                    More
                                </button>
                                <template if:true={showMoreMenu}>
                                    <div class="more-menu">
                                        <template for:each={overflowTabs} for:item="tab">
                                            <div key={tab.id} data-id={tab.id} class={tab.cssClass} onclick={selectTab}>
                                                {tab.label}
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
            <!--Home Page-->
            <template lwc:if={showHome}>
                <div class="home-header">
                    <div class="home-header-left">
                        <span class="partner-account-label">{partnerHeaderLabel}</span>
                    </div>
                    <div class="home-header-actions">
                        <button class="home-action-btn" onclick={showOpeningBalance}>View Opening Balance</button>
                        <button class="home-action-btn" onclick={showTransactions}>View Transactional Data</button>
                    </div>
                </div>

                <template lwc:if={showCarouselView}>
                    <div class="carousel-wrapper">
                        <div class="carousel">
                            <img src={currentImage} alt="carousel-img" class="carousel-img" />
                        </div>
                    </div>
                </template>

                <template lwc:if={showOpeningBalanceView}>
                    <div class="home-table-wrapper">
                        <div class="home-table-header">
                            <h2>Opening Balance</h2>
                            <button class="home-back-btn" onclick={backToCarousel}>Back</button>
                        </div>
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th>Customer Code</th>
                                    <th>Company Code</th>
                                    <th>Year</th>
                                    <th>Amount</th>
                                    <th>Credit/Debit</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={openingBalanceData} for:item="row">
                                    <tr key={row.CustomerCode}>
                                        <td>{row.CustomerCode}</td>
                                        <td>{row.CompanyCode}</td>
                                        <td>{row.Year}</td>
                                        <td>{row.Amount}</td>
                                        <td>{row.CreditDebit}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <template lwc:if={showTransactionsView}>
                    <div class="home-table-wrapper">
                        <div class="home-table-header">
                            <h2>Transactional Data</h2>
                            <button class="home-back-btn" onclick={backToCarousel}>Back</button>
                        </div>
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th>Document No</th>
                                    <th>Entry Date</th>
                                    <th>Company Code</th>
                                    <th>Customer Code</th>
                                    <th>Posting Date</th>
                                    <th>Narration</th>
                                    <th>Doc Type</th>
                                    <th>Debit</th>
                                    <th>Credit</th>
                                    <th>Indicator</th>
                                    <th>Year</th>
                                    <th>Document Date</th>
                                    <th>Plant Code</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={transactionData} for:item="row">
                                    <tr key={row.documentNumber}>
                                        <td>{row.documentNumber}</td>
                                        <td>{row.entryDate}</td>
                                        <td>{row.companyCode}</td>
                                        <td>{row.customerCode}</td>
                                        <td>{row.postingDate}</td>
                                        <td>{row.narration}</td>
                                        <td>{row.docType}</td>
                                        <td>{row.debit}</td>
                                        <td>{row.credit}</td>
                                        <td>{row.indicator}</td>
                                        <td>{row.year}</td>
                                        <td>{row.documentDate}</td>
                                        <td>{row.plantCode}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </template>

            <!--Primary Orders Tab -->
            <template lwc:if={showPrimaryOrders}>
                <template lwc:if={isSubPartLoad}>
                    <div class="no-scroll">
                        <c-loading-screen></c-loading-screen>
                    </div>
                </template>
                <template lwc:else>
                    <div class="orders layouts" id="ordersLayout">
                        <div class="order-head">
                            <template lwc:if={showPrimaryOrders}>
                                <h3 class="order-title">Primary Orders</h3>
                            </template>

                            <div class="order-filters">
                                <lightning-input type="date" class="custominputfieldSize" label="From Date"
                                    name="fromDate" value={ordFilter.fromDate} onchange={handleOrdChange}>
                                </lightning-input>
                                <lightning-input type="date" class="custominputfieldSize" label="To Date" name="toDate"
                                    value={ordFilter.toDate} onchange={handleOrdChange}>
                                </lightning-input>
                                <lightning-input type="search" label="Search" class="custominputfieldSize"
                                    placeholder="Item or Order No." name="serchCust" value={ordFilter.srchVal}
                                    onchange={handleOrdSerch}>
                                </lightning-input>
                            </div>
                        </div>
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th style="width:5%">S.No.</th>
                                    <th style="width:20%">Order No.</th>
                                    <th style="width:15%">Date</th>
                                    <th style="width:15%">Total Quantity (EA)</th>
                                    <th style="width:10%">Total Weight (KG)</th>
                                    <th style="width:10%">Base Amount (₹)</th>
                                    <th style="width:10%">Tax Amount (₹)</th>
                                    <th style="width:15%">Total Amount (₹)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template lwc:if={ordFilter.isOrderDataExisted}>
                                    <template for:each={ordFilter.allordData} for:item="row">
                                        <tr key={row.orderId}>
                                            <td style="width:5%">{row.rowIndex}</td>
                                            <td onclick={openOrderItems} data-id={row.orderId}
                                                style="cursor: pointer; color: blue; text-decoration: underline;width:20%">
                                                {row.orderNo}
                                            </td>
                                            <td style="width:15%">{row.orderDate}</td>
                                            <td style="width:15%">{row.quantity}</td>
                                            <td style="width:10%">{row.totalWeight}</td>
                                            <td style="width:10%">{row.baseAmount}</td>
                                            <td style="width:10%">{row.taxAmount}</td>
                                            <td style="width:15%">{row.amount}</td>
                                        </tr>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <tr>
                                        <td colspan="6">
                                            <div class="slds-truncate" style="text-align:center">
                                                <span style="color:red;padding:10px;font-size:large">No
                                                    records found!</span>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>

                    </div>
                </template>

            </template>

            <template lwc:if={showOrderItems}>
                <div class="orders layouts" id="orderItemsLayout">
                    <div class="order-head">
                        <h3 class="order-title">Order Items for
                            {selectedOrderNo}</h3>

                        <div class="order-filters">
                            <button class="actionButton" onclick={closePrimaryOrderItems}>Back to
                                Orders</button>
                        </div>
                    </div>

                    <table class="contacts-table">
                        <thead>
                            <tr>
                                <th style="width:5%">S. No.</th>
                                <th style="width:15%">SKU Name</th>
                                <th style="width:20%">Quantity (EA)</th>
                                <th style="width:20%">Price (₹)</th>
                                <th style="width:20%">Weight (KG)</th>
                                <th style="width:20%">Base Amount (₹)</th>
                                <th style="width:20%">Tax Amount (₹)</th>
                                <th style="width:20%">Total Amount (₹)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template lwc:if={hasOrderItems}>
                                <template for:each={selectedOrderItems} for:item="item">
                                    <tr key={item.Id}>
                                        <td style="width:5%">{item.rowIndex}</td>
                                        <td style="width:15%">{item.Product__r.Name}</td>
                                        <td style="width:20%">{item.Quantity__c}</td>
                                        <td style="width:20%">{item.Unit_price__c}</td>
                                        <td style="width:20%">{item.NET_WEIGHT__c}</td>
                                        <td style="width:20%">{item.Non_Taxable_Order_Value__c}</td>
                                        <td style="width:20%">{item.Tax_Amount__c}</td>
                                        <td style="width:20%">{item.Total_Amount__c}</td>
                                    </tr>
                                </template>
                            </template>
                            <template lwc:else>
                                <tr>
                                    <td colspan="4">
                                        <div class="slds-truncate" style="text-align:center">
                                            <span style="color:red;padding:10px;font-size:large">No
                                                items found for this
                                                order!</span>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!--<template lwc:if={isNewOrder}>
                <c-primary-order oncancel={handleCancelPrimaryOrder} onordercreated={handlePrimaryOrderCreated}>
                </c-primary-order>
            </template>

            <template lwc:if={isNewOrder2}>
                <c-primary-order2 oncancel={handleCancelPrimaryOrder2} onordercreated={handlePrimaryOrderCreated2}>
                </c-primary-order2>
            </template>

            <template lwc:if={isNewOrder3}>
                <c-primary-order3 oncancel={handlePrimaryOrderCancel3} onordercreated={handlePrimaryOrderCreated3}>
                </c-primary-order3>
            </template>-->

            <!--Primary Invoice Tab -->
            <template lwc:if={showPrimaryInvoices}>
                <template lwc:if={isSubPartLoad}>
                    <div class="no-scroll">
                        <c-loading-screen></c-loading-screen>
                    </div>
                </template>
                <template lwc:else>
                    <div class="orders layouts" id="InvoiceLayout">
                        <h3 class="order-title">Primary Invoices</h3>
                        <div class="order-head">

                            <div class="order-filters">
                                <button disabled={isdableGRNbutton}   class={grnButtonClass}
                                style="margin-top:30px;" onclick={generateGRNpage}>Generate
                                    GRN</button>

                                <!-- <button onclick={makePaymemt} disabled={isMakePaymentDisabled}
                                    class={makePaymentButtonClass} style="margin-top:30px;" title={makePaymentTooltip}>
                                    Make Payment
                                </button>-->

                                <button class="actionButton" onclick={downloadPrimaryInvoicesasCSV}
                                    style="background-color: #28a745; color: white; margin-top:30px; align-items: center; padding: 6px 12px; border-radius: 4px;">
                                    <span style="align-items: center;">
                                        <lightning-icon icon-name="utility:download" alternative-text="Download"
                                            size="x-small"
                                            style="margin-left: 4px; --slds-c-icon-color-foreground-default: white;">
                                        </lightning-icon>
                                    </span>
                                </button>

                                <lightning-combobox name="statusFilter" label="Status" class="custominputfieldSize"
                                    value={InvFilter.status} placeholder="Select Status" options={statusOptions}
                                    onchange={handleStatusChange}>
                                </lightning-combobox>

                                <c-make-payment-popup is-open={showModal} invoice-count={invoiceCountForModal}
                                    total-amount={totalAmountForModal} onpay={handlePayEvent}
                                    oncancel={handleCancelEvent}>
                                </c-make-payment-popup>

                                <lightning-input type="date" class="custominputfieldSize" label="From Date"
                                    name="fromDate" value={InvFilter.fromDate} onchange={handleInvChange}>
                                </lightning-input>
                                <lightning-input type="date" class="custominputfieldSize" label="To Date" name="toDate"
                                    value={InvFilter.toDate} onchange={handleInvChange}>
                                </lightning-input>
                                <lightning-input type="search" label="Customer" class="custominputfieldSize"
                                    placeholder="Customer or Invoice No." name="serchCust" value={InvFilter.srchVal}
                                    onchange={handleInvSerch}>
                                </lightning-input>

                            </div>
                        </div>

                        <!-- Primary Invoices Table -->
                        <div style="overflow-x: auto; width: 95%; border-radius:10px;">
                            <table class="contacts-table" style="min-width: 1800px; width: 100%; table-layout: fixed; border-collapse: collapse;">
                                <thead>
                                    <tr>
                                        <th style="width:3%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">
                                            <c-custom-check-box type="checkbox" onchange={handleSelectAll} checked={isAllSelected}></c-custom-check-box>
                                        </th>
                                        <th style="width:4%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">S.No.</th>
                                        <th style="width:8%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">SAP Inv No.</th>
                                        <th style="width:8%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">SF Inv No.</th>
                                        <th style="width:11%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">Party Name</th>
                                        <th style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">GST No.</th>
                                        <th style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">Order No.</th>
                                        <th style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">Invoice Date</th>
                                        <th style="width:5%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">Total Qty</th>
                                        <th style="width:10%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">Base Amount</th>
                                        <th style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">SGST</th>
                                        <th style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">CGST</th>
                                        <th style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">IGST</th>
                                        <th style="width:9%; word-break:break-word; overflow-wrap:break-word; white-space:nowrap; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">Total Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template lwc:if={InvFilter.isInvoiceDataExisted}>
                                        <template for:each={InvFilter.allInvData} for:item="inv">
                                            <tr key={inv.InvId}>
                                                <td style="width:3%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">
                                                    <c-custom-check-box checked={inv.isSelected} onchange={handleRowSelection} name={inv.InvId}></c-custom-check-box>
                                                </td>
                                                <td style="width:4%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.rowIndex}</td>
                                                <td style="width:8%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle; cursor:pointer; color:blue; text-decoration:underline;"
                                                    data-id={inv.InvId} onclick={handleInvoiceClick}>
                                                    {inv.invoiceNo}
                                                </td>
                                                <td style="width:8%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.name}</td>
                                                <td style="width:11%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.companyName}</td>
                                                <td style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.gstNumber}</td>
                                                <td style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.orderId}</td>
                                                <td style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.InvDate}</td>
                                                <td style="width:5%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.TotalQuantity}</td>
                                                <td style="width:10%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.nonTaxableAmount}</td>
                                                <td style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.sgstAmount}</td>
                                                <td style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.cgstAmount}</td>
                                                <td style="width:7%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.igstAmount}</td>
                                                <td style="width:9%; word-break:break-word; overflow-wrap:break-word; white-space:normal; overflow:hidden; padding:8px; text-align:left; vertical-align:middle;">{inv.Amount}</td>
                                            </tr>
                                        </template>
                                    </template>
                                    <template lwc:else>
                                        <tr>
                                            <td colspan="14" style="text-align:center; color:red; padding:10px; font-size:large;">
                                                No records found!
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </template>
            </template>
            <!-- Invoice Items Table - Shown only if invoice is selected -->
            <template lwc:if={showInvoiceItems}>
                <template lwc:if={isSubPartLoad}>
                    <div class="no-scroll">
                        <c-loading-screen></c-loading-screen>
                    </div>
                </template>
                <template lwc:else>
                    <div class="orders layouts" id="invoiceItemsLayout">
                        <div class="order-head">
                            <h3 class="order-title">Invoice Items for Invoice:
                                {selectedInvoiceId}</h3>

                            <div class="order-filters">
                                <button class="actionButton" onclick={closePrimaryInvoiceItems}>Back to
                                    Invoices</button>
                            </div>
                        </div>

                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th style="width:5%">S.No.</th>
                                    <th style="width:15%">SKU Name</th>
                                    <th style="width:20%">Quantity</th>
                                    <th style="width:20%">Unit Price</th>
                                    <th style="width:20%">Tax Amount</th>
                                    <th style="width:20%">Total Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template lwc:if={hasInvoiceItems}>
                                    <template for:each={invoiceItems} for:item="item">
                                        <tr key={item.Id}>
                                            <td style="width:5%">{item.rowIndex}</td>
                                            <td style="width:15%">{item.ItemName}</td>
                                            <td style="width:20%">{item.Quantity}</td>
                                            <td style="width:20%">{item.unitPrice}</td>
                                            <td style="width:20%">{item.TaxAmount}</td>
                                            <td style="width:20%">{item.TotalAmount}</td>
                                        </tr>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <tr>
                                        <td colspan="4">
                                            <div class="slds-truncate" style="text-align:center">
                                                <span style="color:red;padding:10px;font-size:large">
                                                    No invoice items found for this
                                                    invoice!
                                                </span>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </template>

            <!-- GRN Screen -->
            <template lwc:if={isgenerateGRN}>
                <c-generate-g-r-npage invoice-ids={selectedInvoiceIds} invoice-items={selectedInvoiceItems}
                    ongrncreated={handleGRNComplete} oncancel={handleGRNCancel}>
                </c-generate-g-r-npage>
            </template>

            <!--Primary Return Tab-->
            <template lwc:if={showPrimaryReturn}>
                <template lwc:if={isSubPartLoad}>
                    <div class="no-scroll">
                        <c-loading-screen></c-loading-screen>
                    </div>
                </template>
                <template lwc:else>
                    <div class="orders layouts" id="primaryReturnLayout">
                        <div class="order-head">
                            <h3 class="order-title">Sale Return</h3>
                            <div class="order-filters">
                                <!--<button class="actionButton" style="margin-top: 27px;"
                                    onclick={newreturnScreen}>New 
                                    Return</button>-->
                                <lightning-input type="date" class="custominputfieldSize" label="From Date"
                                    name="fromDate" value={primaryReturnFilter.fromDate}
                                    onchange={handlePrimaryReturnChange}>
                                </lightning-input>
                                <lightning-input type="date" class="custominputfieldSize" label="To Date" name="toDate"
                                    value={primaryReturnFilter.toDate} onchange={handlePrimaryReturnChange}>
                                </lightning-input>
                                <lightning-input type="search" label="Search" class="custominputfieldSize"
                                    placeholder="Return No." name="serchCust" value={primaryReturnFilter.srchVal}
                                    onchange={handlePrimaryReturnSerch}>
                                </lightning-input>
                            </div>
                        </div>

                        <!-- Primary Returns Table -->
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th style="width:5%">S.No.</th>
                                    <th style="width:15%">Return No.</th>
                                    <th style="width:20%">Total Quantity</th>
                                    <th style="width:20%">Total Amount</th>
                                    <th style="width:20%">Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template lwc:if={primaryReturnFilter.isDataExisted}>
                                    <template for:each={primaryReturnFilter.allPReturnData} for:item="ret">
                                        <tr key={ret.primaryReturnId}>
                                            <td style="width:5%">{ret.rowIndex}</td>
                                            <td style="cursor: pointer; color: blue; text-decoration: underline;width:15%"
                                                data-id={ret.primaryReturnId} onclick={handleReturnNoClick}>
                                                {ret.primaryReturnNo}
                                            </td>
                                            <td style="width:20%">{ret.totalQuantity}</td>
                                            <td style="width:20%">{ret.totalAmount}</td>
                                            <td style="width:20%">{ret.returnDate}</td>
                                        </tr>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <tr>
                                        <td colspan="4"
                                            style="text-align:center; color:red; padding:10px; font-size:large;">
                                            No records found!
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </template>
            <!-- Primary Return Items Table -->

                                <lightning-input type="date" class="custominputfieldSize" label="To Date" name="toDate"
                                    variant="label-hidden" value={reportFilter.toDate} onchange={handleReportChange}>
                                </lightning-input>
                                <lightning-input type="search" label="Search" class="custominputfieldSize"
                                    placeholder="Keyword or Report Name" name="srchVal" variant="label-hidden"
                                    value={reportFilter.srchVal} onchange={handleReportSearch}>
                                </lightning-input>
                            </div>
                        </div>
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th>Report Name</th>
                                    <th>Generated By</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template lwc:if={reportFilter.isDataExisted}>
                                    <template for:each={reportFilter.allReportData} for:item="row">
                                        <tr key={row.reportId}>
                                            <td>{row.reportName}</td>
                                            <td>{row.createdBy}</td>
                                            <td>{row.reportDate}</td>
                                            <td>{row.status}</td>
                                            <td>
                                                <button class="actionButton" data-id={row.reportId}
                                                    onclick={downloadReport}>Download</button>
                                            </td>
                                        </tr>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <tr>
                                        <td colspan="5">
                                           <div style="height: 200px; display: flex; align-items: center; justify-content: center;">
                                                <div class="slds-truncate">
                                                    <span style="color:red; font-size:large;">
                                                        No records found!
                                                    </span>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </template>

            <!--Stock Adjustment -->
            <template lwc:if={showStockAdjustment}>
                <template lwc:if={isSubPartLoad}>
                    <div class="no-scroll">
                        <c-loading-screen></c-loading-screen>
                    </div>
                </template>
                <template lwc:else>
                    <div class="orders layouts" id="stockadjustmentdLayout">
                        <h3 class="order-title">Stock Adjustments</h3>
                        <div class="order-head">
                            <div class="order-filters">
                                <button class="StockAdjustmentactionButton" style="margin-top: 27px;"
                                    onclick={handlerNewStockAdjustmentClick}>New
                                    Stock Adjustment</button>
                                <lightning-combobox name="status" label="Status" class="custominputfieldSize"
                                    value={stockAdjustmentFilter.status} placeholder="Select Status"
                                    options={stockAdjustmentFilter.statusVal} onchange={handlestockAdjustmentChange}>
                                </lightning-combobox>
                                <lightning-input type="date" class="custominputfieldSize" label="From Date"
                                    name="fromDate" value={stockAdjustmentFilter.fromDate}
                                    onchange={handlestockAdjustmentChange}>
                                </lightning-input>
                                <lightning-input type="date" class="custominputfieldSize" label="To Date" name="toDate"
                                    value={stockAdjustmentFilter.toDate} onchange={handlestockAdjustmentChange}>
                                </lightning-input>
                                <lightning-input type="search" label="Search" class="custominputfieldSize"
                                    placeholder="Search SKU Name" name="searchCust"
                                    value={stockAdjustmentFilter.srchVal} onchange={handleStockAdjustmentSerch}>
                                </lightning-input>
                            </div>
                        </div>

                        <!-- Secondary Return Table -->
                        <table class="contacts-table">
                            <thead>
                                <tr>
                                    <th style="width:5%">S.No.</th>
                                    <th style="width:15%">Stock Adjustment No</th>
                                    <th style="width:15%">SKU Name</th>
                                    <th style="width:15%">Adjustment Type</th>
                                    <th style="width:15%">Quantity</th>
                                    <th style="width:10%">Date</th>
                                    <th style="width:25%">Reason</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template lwc:if={stockAdjustmentFilter.isDataExisted}>
                                    <template for:each={stockAdjustmentFilter.allStockAdjuments} for:item="row">
                                        <tr key={row.recordId}>
                                            <td style="width:5%">{row.rowIndex}</td>
                                            <td style="width:15%">{row.stockId} </td>
                                            <td style="width:15%">{row.productName}</td>
                                            <td style="width:15%">{row.AdjustmentType}</td>
                                            <td style="width:15%">{row.quantity}</td>
                                            <td style="width:10%">{row.stockDate}</td>
                                            <td style="width:25%">{row.reason}</td>
                                        </tr>
                                    </template>
                                </template>
                                <template lwc:else>
                                    <tr>
                                        <td colspan="5">
                                            <div class="slds-truncate" style="text-align:center">
                                                <span style="color:red;padding:10px;font-size:large">No
                                                    records found!</span>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>

                        </table>
                    </div>
                </template>
            </template>
            <template lwc:if={isShowNewAdjustStock}>
                <c-newstock-adjustment oncancel={handleNewStockAdjustmentCancel}
                onreturncreated={handleStockAdjustmentCreation}></c-newstock-adjustment>
            </template>

            <!--Product Gallery Tab-->
            <template lwc:if={showProductGallery}>
                <c-product-gallery-lwc></c-product-gallery-lwc>
            </template>

             <!--showSecondaryCustomerLedger Tab-->
            <template lwc:if={showSecondaryCustomerLedger}>
                <c-secondary-customer-ledger></c-secondary-customer-ledger>
            </template>

          
            <!--showProductMatser Tab-->
            <template lwc:if={showProductMatser}>
                <c-product-master-table></c-product-master-table>
            </template>
              <!--showProductMatser Tab-->
            <template lwc:if={showSchemes}>
                <c-running-schemes></c-running-schemes>
            </template>

        </div>
    </div>

    <c-custom-toast auto-close-time="8000"></c-custom-toast>
</template>
