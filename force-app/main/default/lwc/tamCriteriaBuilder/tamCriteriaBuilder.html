<template>
    <div class="tcb-container">

        <!-- ═══════ LIST VIEW ═══════ -->
        <template if:true={isListView}>
            <div class="tcb-header">
                <div class="tcb-header-left">
                    <lightning-icon icon-name="custom:custom63" size="medium"></lightning-icon>
                    <h1>Target Criteria Manager</h1>
                </div>
                <lightning-button label="New Criteria" variant="brand" icon-name="utility:add"
                    onclick={handleNewCriteria}></lightning-button>
            </div>

            <!-- Stats Bar + Category Filter -->
            <div class="tcb-stats-bar">
                <div class="tcb-stat">
                    <span class="tcb-stat-value">{totalCount}</span>
                    <span class="tcb-stat-label">Total</span>
                </div>
                <div class="tcb-stat">
                    <span class="tcb-stat-value tcb-stat-active">{activeCount}</span>
                    <span class="tcb-stat-label">Active</span>
                </div>
                <div class="tcb-stat">
                    <span class="tcb-stat-value tcb-stat-inactive">{inactiveCount}</span>
                    <span class="tcb-stat-label">Inactive</span>
                </div>
                <div class="tcb-filter-pills">
                    <template for:each={categoryFilters} for:item="cat">
                        <span key={cat.value} class={cat.pillClass} data-value={cat.value}
                            onclick={handleCategoryFilter}>{cat.label}</span>
                    </template>
                </div>
            </div>

            <!-- Bulk Action Bar -->
            <template if:true={hasSelectedItems}>
                <div class="tcb-bulk-bar">
                    <span class="tcb-bulk-count">{selectedCount} selected</span>
                    <lightning-button label="Activate" variant="brand" icon-name="utility:toggle_on"
                        onclick={handleBulkActivate} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Deactivate" variant="neutral" icon-name="utility:toggle_off"
                        onclick={handleBulkDeactivate} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Delete" variant="destructive" icon-name="utility:delete"
                        onclick={handleBulkDelete}></lightning-button>
                    <lightning-button label="Clear Selection" variant="base"
                        onclick={handleClearSelection} class="slds-m-left_medium"></lightning-button>
                </div>
            </template>

            <template if:true={hasFilteredCriteria}>
                <div class="tcb-table-wrapper">
                    <table class="tcb-table">
                        <thead>
                            <tr>
                                <th class="tcb-th-check" onclick={stopPropagation}>
                                    <lightning-input type="checkbox" checked={allSelected}
                                        onchange={handleSelectAll} variant="label-hidden"
                                        label="Select All"></lightning-input>
                                </th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Object</th>
                                <th>Operator</th>
                                <th>Filters</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={filteredCriteriaList} for:item="item">
                                <tr key={item.Id} class="tcb-row" data-id={item.Id} onclick={handleRowClick}>
                                    <td class="tcb-td-check" onclick={stopPropagation}>
                                        <lightning-input type="checkbox" checked={item.selected}
                                            data-id={item.Id} onchange={handleSelectItem}
                                            variant="label-hidden" label="Select"></lightning-input>
                                    </td>
                                    <td class="tcb-name-cell">{item.Name}</td>
                                    <td>
                                        <template if:true={item.Category__c}>
                                            <span class="tcb-category-badge">{item.Category__c}</span>
                                        </template>
                                    </td>
                                    <td><span class="tcb-badge">{item.Object__c}</span></td>
                                    <td>{item.Operator__c}</td>
                                    <td>{item.filterCountDisplay}</td>
                                    <td>
                                        <template if:true={item.Active__c}>
                                            <span class="tcb-status-active">Active</span>
                                        </template>
                                        <template if:false={item.Active__c}>
                                            <span class="tcb-status-inactive">Inactive</span>
                                        </template>
                                    </td>
                                    <td class="tcb-actions" onclick={stopPropagation}>
                                        <template if:true={item.Active__c}>
                                            <lightning-button-icon icon-name="utility:toggle_on"
                                                variant="brand" alternative-text="Deactivate"
                                                data-id={item.Id} onclick={handleToggleActive}
                                                class="slds-m-right_xx-small"></lightning-button-icon>
                                        </template>
                                        <template if:false={item.Active__c}>
                                            <lightning-button-icon icon-name="utility:toggle_off"
                                                variant="border-filled" alternative-text="Activate"
                                                data-id={item.Id} onclick={handleToggleActive}
                                                class="slds-m-right_xx-small"></lightning-button-icon>
                                        </template>
                                        <lightning-button-icon icon-name="utility:edit" variant="border-filled"
                                            alternative-text="Edit" data-id={item.Id} onclick={handleEdit}
                                            class="slds-m-right_xx-small"></lightning-button-icon>
                                        <lightning-button-icon icon-name="utility:delete" variant="border-filled"
                                            alternative-text="Delete" data-id={item.Id}
                                            onclick={handleDelete}></lightning-button-icon>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <template if:false={hasFilteredCriteria}>
                <template if:false={isLoading}>
                    <div class="tcb-empty">
                        <lightning-icon icon-name="standard:empty" size="large"></lightning-icon>
                        <template if:true={hasCriteria}>
                            <h2>No Criteria Match Filter</h2>
                            <p>Try selecting a different category or click "All" to see everything.</p>
                        </template>
                        <template if:false={hasCriteria}>
                            <h2>No Target Criteria Found</h2>
                            <p>Create your first criteria to start defining dynamic targets.</p>
                            <lightning-button label="Create Criteria" variant="brand" onclick={handleNewCriteria}
                                class="slds-m-top_medium"></lightning-button>
                        </template>
                    </div>
                </template>
            </template>
        </template>

        <!-- ═══════ DETAIL VIEW ═══════ -->
        <template if:true={isDetailView}>
            <div class="tcb-detail-header">
                <lightning-button-icon icon-name="utility:back" variant="bare" alternative-text="Back"
                    onclick={handleBackToList} class="slds-m-right_small"></lightning-button-icon>
                <div class="tcb-detail-title">
                    <h1>{selectedCriteria.Name}</h1>
                    <template if:true={selectedCriteria.Active__c}>
                        <span class="tcb-status-active slds-m-left_small">Active</span>
                    </template>
                    <template if:false={selectedCriteria.Active__c}>
                        <span class="tcb-status-inactive slds-m-left_small">Inactive</span>
                    </template>
                </div>
                <div class="tcb-detail-actions">
                    <lightning-button label="Preview" variant="neutral" icon-name="utility:preview"
                        onclick={handlePreviewFromDetail} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Clone" variant="neutral" icon-name="utility:copy"
                        onclick={handleClone} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Edit" variant="neutral" icon-name="utility:edit"
                        onclick={handleEditFromDetail} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Delete" variant="destructive-text" icon-name="utility:delete"
                        onclick={handleDeleteFromDetail}></lightning-button>
                </div>
            </div>

            <div class="tcb-detail-content slds-grid slds-gutters slds-wrap">
                <!-- Details (full width — the legacy Generated Query Preview column has been removed) -->
                <div class="slds-col slds-size_1-of-1">
                    <section class="tcb-card general">
                        <div class="tcb-card-header">
                            <span>Criteria Information</span>
                        </div>
                        <div class="tcb-card-body">
                            <div class="tcb-detail-grid">
                                <div class="tcb-detail-field">
                                    <span class="tcb-detail-label">Category</span>
                                    <span class="tcb-detail-value">
                                        <template if:true={selectedCriteria.Category__c}>
                                            <span class="tcb-category-badge">{selectedCriteria.Category__c}</span>
                                        </template>
                                        <template if:false={selectedCriteria.Category__c}>
                                            <span class="slds-text-color_weak">—</span>
                                        </template>
                                    </span>
                                </div>
                                <div class="tcb-detail-field">
                                    <span class="tcb-detail-label">Object</span>
                                    <span class="tcb-detail-value"><span class="tcb-badge">{selectedCriteria.Object__c}</span></span>
                                </div>
                                <div class="tcb-detail-field">
                                    <span class="tcb-detail-label">Operator</span>
                                    <span class="tcb-detail-value">{selectedCriteria.Operator__c}</span>
                                </div>
                                <div class="tcb-detail-field">
                                    <span class="tcb-detail-label">SUM Field</span>
                                    <span class="tcb-detail-value">{selectedCriteria.Field__c}</span>
                                </div>
                                <div class="tcb-detail-field">
                                    <span class="tcb-detail-label">Date Field</span>
                                    <span class="tcb-detail-value">{selectedCriteria.Date_Field__c}</span>
                                </div>
                                <div class="tcb-detail-field">
                                    <span class="tcb-detail-label">User Field</span>
                                    <span class="tcb-detail-value">{selectedCriteria.User_Field__c}</span>
                                </div>
                                <div class="tcb-detail-field">
                                    <span class="tcb-detail-label">Filter Logic</span>
                                    <span class="tcb-detail-value">{selectedCriteria.Filter_Logic__c}</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <template if:true={detailHasFilters}>
                        <section class="tcb-card filters">
                            <div class="tcb-card-header">
                                <span>Filters ({detailFilterCount})</span>
                            </div>
                            <div class="tcb-card-body">
                                <template for:each={detailFilters} for:item="f">
                                    <div key={f.id} class="tcb-filter-detail-row">
                                        <span class="tcb-filter-num">{f.id}</span>
                                        <span class="tcb-filter-expr">{f.field} <strong>{f.operator}</strong> {f.value}</span>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </template>
                </div>
            </div>
        </template>

        <!-- ═══════ BUILDER VIEW (Create / Edit) ═══════ -->
        <template if:true={isBuilderView}>
            <div class="tcb-builder-header">
                <lightning-button-icon icon-name="utility:back" variant="bare" alternative-text="Back"
                    onclick={handleBackToList} class="slds-m-right_small"></lightning-button-icon>
                <h1>{builderTitle}</h1>
            </div>

            <!-- Stepper -->
            <div class="tcb-steps">
                <div class={step1Class}>
                    <div class="tcb-step-circle circle1">1</div>
                    <div class="tcb-step-label">General</div>
                </div>
                <div class={step2Class}>
                    <div class="tcb-step-circle circle2">2</div>
                    <div class="tcb-step-label">Field Mapping</div>
                </div>
                <div class={step3Class}>
                    <div class="tcb-step-circle circle3">3</div>
                    <div class="tcb-step-label">Filters &amp; Logic</div>
                </div>
                <div class={step4Class}>
                    <div class="tcb-step-circle circle4">4</div>
                    <div class="tcb-step-label">Summary</div>
                </div>
            </div>

            <!-- STEP 1: GENERAL -->
            <template if:true={isStep1}>
                <section class="tcb-card general">
                    <div class="tcb-card-header">
                        <lightning-icon icon-name="utility:settings" size="x-small"></lightning-icon>
                        <span>General Settings</span>
                    </div>
                    <div class="tcb-card-body">
                        <p class="tcb-help-text slds-m-bottom_small">
                            Name this criterion and pick the source object the achievement will be measured on
                            (usually Order Item for secondary sales). You can group criteria by Category for filtering.
                        </p>
                        <div class="two-col">
                            <lightning-input label="Criteria Name" data-field="Name" value={criteria.Name}
                                onchange={handleInput} required></lightning-input>
                            <lightning-combobox label="Category" data-field="Category__c"
                                value={criteria.Category__c} options={categoryOptions}
                                onchange={handleInput} placeholder="Select a category"></lightning-combobox>
                            <template if:true={isEditMode}>
                                <div>
                                    <lightning-input type="text" label="Object" value={objectSearchText}
                                        disabled read-only></lightning-input>
                                    <p class="tcb-help-text tcb-lock-hint">
                                        Object cannot be changed after save. Clone this criteria to use a different object.
                                    </p>
                                </div>
                            </template>
                            <template if:false={isEditMode}>
                                <div class="tcb-search-box">
                                    <lightning-input type="text" label="Search Object" placeholder="Search objects..."
                                        value={objectSearchText} onchange={handleObjectSearch} required></lightning-input>
                                    <template if:true={showObjectDropdown}>
                                        <div class="tcb-dropdown">
                                            <template for:each={filteredObjects} for:item="obj">
                                                <div key={obj.api} class="tcb-option" data-api={obj.api}
                                                    data-label={obj.label} onclick={selectObject}>
                                                    <lightning-icon icon-name="utility:database"
                                                        size="x-small"></lightning-icon>
                                                    <div class="tcb-option-text">
                                                        <div class="tcb-label">{obj.label}</div>
                                                        <div class="tcb-api">({obj.api})</div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </section>

            </template>

            <!-- STEP 2: FIELD MAPPING -->
            <template if:true={isStep2}>
                <section class="tcb-card mapping">
                    <div class="tcb-card-header">
                        <lightning-icon icon-name="utility:link" size="x-small"></lightning-icon>
                        <span>Field Mapping</span>
                    </div>
                    <div class="tcb-card-body">
                        <p class="tcb-help-text slds-m-bottom_small">
                            Pick the Operator (the maths the engine runs) and map the fields it should read.
                            Date and User fields tell the engine how to filter by period and per-user.
                            Different operators require different extra inputs — they appear below as needed.
                        </p>
                        <div class="two-col">
                            <lightning-combobox label="Operator" data-field="Operator__c"
                                value={criteria.Operator__c} options={operatorOptions}
                                onchange={handleOperatorChange} required></lightning-combobox>
                            <template if:true={isSumOperator}>
                                <lightning-combobox label="SUM Field" data-field="Field__c"
                                    value={criteria.Field__c} options={numberFieldOptions}
                                    onchange={handleInput} required></lightning-combobox>
                            </template>
                        </div>

                        <template if:true={showSourceMapping}>
                            <div class="two-col">
                                <lightning-combobox label="Date Field" data-field="Date_Field__c"
                                    value={criteria.Date_Field__c} options={dateFieldOptions}
                                    onchange={handleInput} required></lightning-combobox>
                                <lightning-combobox label="User Field" data-field="User_Field__c"
                                    value={criteria.User_Field__c} options={userFieldOptions}
                                    onchange={handleInput} required></lightning-combobox>
                            </div>

                            <template if:true={showDistinctField}>
                                <div class="two-col">
                                    <lightning-combobox label="Distinct Field (outlet)" data-field="Distinct_Field__c"
                                        value={criteria.Distinct_Field__c} options={allFieldOptions}
                                        onchange={handleInput} required></lightning-combobox>
                                </div>
                            </template>

                            <template if:true={showOrderField}>
                                <div class="two-col">
                                    <lightning-combobox label="Order Field (to count distinct orders/day)"
                                        data-field="Distinct_Field__c"
                                        value={criteria.Distinct_Field__c} options={allFieldOptions}
                                        onchange={handleInput} required></lightning-combobox>
                                </div>
                                <p class="tcb-help-text">
                                    Average TLSD = (line-item rows ÷ distinct orders) per day, averaged over the divisor.
                                    Pick the field that identifies the order (e.g. Order).
                                </p>
                            </template>

                            <template if:true={showRatioFields}>
                                <div class="two-col">
                                    <lightning-combobox label="Numerator Field" data-field="Numerator_Field__c"
                                        value={criteria.Numerator_Field__c} options={numberFieldOptions}
                                        onchange={handleInput} required></lightning-combobox>
                                    <lightning-combobox label="Denominator Field" data-field="Denominator_Field__c"
                                        value={criteria.Denominator_Field__c} options={numberFieldOptions}
                                        onchange={handleInput} required></lightning-combobox>
                                </div>
                            </template>

                            <template if:true={showAttendanceDivisor}>
                                <div class="two-col">
                                    <lightning-input type="checkbox" label="Use Attendance Divisor (working days)"
                                        data-field="Use_Attendance_Divisor__c"
                                        checked={criteria.Use_Attendance_Divisor__c}
                                        onchange={handleCheckbox}></lightning-input>
                                </div>
                            </template>

                            <template if:true={showSecondarySources}>
                                <div class="slds-form-element slds-m-top_small">
                                    <label class="slds-form-element__label">
                                        Secondary Source Objects (union for de-duplicated outlet count)
                                    </label>
                                    <p class="tcb-help-text slds-m-bottom_x-small">
                                        Adds other objects whose outlet touches should also count toward this metric,
                                        deduplicated per day with the primary source. Common example for TC: add the
                                        Visit object (Object API <code>Visit__c</code>, User Field <code>OwnerId</code>,
                                        Date Field <code>Date__c</code>, Outlet Field <code>Account1__c</code>).
                                    </p>
                                    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                                        <thead>
                                            <tr class="slds-text-title_caps">
                                                <th>Object API</th>
                                                <th>User Field</th>
                                                <th>Date Field</th>
                                                <th>Outlet (Distinct) Field</th>
                                                <th style="width:4rem;"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={secondarySourceRows} for:item="row">
                                                <tr key={row.id}>
                                                    <td><lightning-input type="text" variant="label-hidden"
                                                        data-id={row.id} data-field="object" value={row.object}
                                                        onchange={handleSecondarySourceField}
                                                        placeholder="Visit__c"></lightning-input></td>
                                                    <td><lightning-input type="text" variant="label-hidden"
                                                        data-id={row.id} data-field="userField" value={row.userField}
                                                        onchange={handleSecondarySourceField}
                                                        placeholder="OwnerId"></lightning-input></td>
                                                    <td><lightning-input type="text" variant="label-hidden"
                                                        data-id={row.id} data-field="dateField" value={row.dateField}
                                                        onchange={handleSecondarySourceField}
                                                        placeholder="Date__c"></lightning-input></td>
                                                    <td><lightning-input type="text" variant="label-hidden"
                                                        data-id={row.id} data-field="distinctField" value={row.distinctField}
                                                        onchange={handleSecondarySourceField}
                                                        placeholder="Account1__c"></lightning-input></td>
                                                    <td class="slds-text-align_center">
                                                        <lightning-button-icon icon-name="utility:delete"
                                                            alternative-text="Remove" variant="bare"
                                                            data-id={row.id}
                                                            onclick={handleRemoveSecondarySource}></lightning-button-icon>
                                                    </td>
                                                </tr>
                                            </template>
                                            <template if:false={hasSecondarySourceRows}>
                                                <tr>
                                                    <td colspan="5" class="slds-text-color_weak slds-text-align_center slds-p-around_small">
                                                        No extra sources. The primary source above is the only one used.
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                    <div class="slds-m-top_x-small">
                                        <lightning-button label="Add Source" icon-name="utility:add"
                                            onclick={handleAddSecondarySource}></lightning-button>
                                    </div>
                                </div>
                            </template>
                        </template>

                        <template if:true={isFocusPack}>
                            <div class="two-col">
                                <lightning-combobox label="Date Field (defaults to Order Date)"
                                    data-field="Date_Field__c"
                                    value={criteria.Date_Field__c} options={dateFieldOptions}
                                    onchange={handleInput}></lightning-combobox>
                                <lightning-combobox label="User Field (defaults to Order Owner Id)"
                                    data-field="User_Field__c"
                                    value={criteria.User_Field__c} options={userFieldOptions}
                                    onchange={handleInput}></lightning-combobox>
                            </div>
                            <p class="tcb-help-text">
                                Focus-Pack operators read SKUs and the qualifying quantity from the Focus
                                Pack chosen on each Secondary Target. The pack is selected per target in the
                                Secondary Target Manager, not here. Add your secondary-order condition
                                (e.g. Customer_Order_Type__c = 'Secondary Order') in the Filters step —
                                pick Order Item as the Object in Step 1 so the fields are available.
                                Date and User fields default to Order_Date__c and Order_Owner_Id__c if left blank.
                            </p>
                            <template if:true={showFocusValueField}>
                                <div class="two-col">
                                    <lightning-combobox label="Revenue Field (defaults to pre-tax order value)"
                                        data-field="Field__c"
                                        value={criteria.Field__c} options={numberFieldOptions}
                                        onchange={handleInput}></lightning-combobox>
                                </div>
                                <p class="tcb-help-text">
                                    Leave blank to use Non_Taxable_Order_Value__c (revenue excludes tax, BRD 3.3.5).
                                    Selecting a field requires choosing Order Item as the Object in Step 1.
                                </p>
                            </template>
                            <template if:true={showFocusQtyField}>
                                <div class="two-col">
                                    <lightning-combobox label="Quantity Field (defaults to Quantity)"
                                        data-field="Field__c"
                                        value={criteria.Field__c} options={numberFieldOptions}
                                        onchange={handleInput}></lightning-combobox>
                                </div>
                                <p class="tcb-help-text">
                                    Field summed per order for the minimum-quantity ECO check (BRD 3.4.5).
                                    Set to the ordered quantity field (e.g. Each Qty). Choose Order Item as the Object in Step 1 to list fields.
                                </p>
                            </template>
                            <template if:true={showFocusOutletField}>
                                <div class="two-col">
                                    <lightning-combobox label="Outlet Field (defaults to Account)"
                                        data-field="Distinct_Field__c"
                                        value={criteria.Distinct_Field__c} options={allFieldOptions}
                                        onchange={handleInput}></lightning-combobox>
                                </div>
                                <p class="tcb-help-text">
                                    Pick the field that identifies the outlet. If Account is empty on the line,
                                    pick "Order > Account" (the parent's Account) instead. Choose Order Item as the Object in Step 1 so the list is populated.
                                </p>
                            </template>
                        </template>

                        <template if:true={showSourceMapping}>
                            <p class="tcb-help-text">
                                Operator, Date Field and User Field are mandatory. SUM Field is required for SUM,
                                a Distinct Field for COUNT DISTINCT / DAILY UNIQUE AVG, and Numerator/Denominator for DAILY RATIO AVG.
                            </p>
                        </template>
                    </div>
                </section>
            </template>

            <!-- STEP 3: FILTERS -->
            <template if:true={isStep3}>
                <section class="tcb-card filters">
                    <div class="tcb-card-header">
                        <lightning-icon icon-name="utility:filterList" size="x-small"></lightning-icon>
                        <span>Filters &amp; Filter Logic</span>
                    </div>
                    <div class="tcb-card-body">
                        <p class="tcb-help-text slds-m-bottom_small">
                            Add WHERE filters to scope the data this criterion reads — for example, restrict to
                            secondary orders only (<code>Customer_Order_Type__c = Secondary Order</code>). The engine
                            already filters by date range and user, so add only the extra business filters here.
                        </p>
                        <c-tam-filter-builder fields-metadata={fieldsMetadata} value={filters}
                            onfilterchange={handleFilterChange}></c-tam-filter-builder>
                    </div>
                </section>
                <section class="tcb-card logic">
                    <div class="tcb-card-header">
                        <lightning-icon icon-name="utility:formula" size="x-small"></lightning-icon>
                        <span>Filter Logic</span>
                    </div>
                    <div class="tcb-card-body">
                        <lightning-input label="Logic Expression (e.g. 1 AND (2 OR 3))"
                            data-field="Filter_Logic__c" value={criteria.Filter_Logic__c}
                            onchange={handleInput}></lightning-input>
                        <template if:true={logicError}>
                            <div class="tcb-error">{logicError}</div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- STEP 4: SUMMARY -->
            <template if:true={isStep4}>
                <section class="tcb-card json">
                    <div class="tcb-card-header">
                        <lightning-icon icon-name="utility:summary" size="x-small"></lightning-icon>
                        <span>Summary</span>
                    </div>
                    <div class="tcb-card-body">
                        <p class="tcb-help-text slds-m-bottom_small">
                            Review everything before saving. Click Run Preview to test the criterion against the current
                            month's data and confirm the achievement matches expectations.
                        </p>
                        <div class="tcb-summary-grid">
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">Criteria Name</span>
                                <span class="tcb-summary-value">{criteria.Name}</span>
                            </div>
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">Object</span>
                                <span class="tcb-summary-value">{selectedObjectLabel}</span>
                            </div>
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">Operator</span>
                                <span class="tcb-summary-value">{criteria.Operator__c}</span>
                            </div>
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">SUM Field</span>
                                <span class="tcb-summary-value">{selectedFieldLabel}</span>
                            </div>
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">Date Field</span>
                                <span class="tcb-summary-value">{selectedDateFieldLabel}</span>
                            </div>
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">User Field</span>
                                <span class="tcb-summary-value">{selectedUserFieldLabel}</span>
                            </div>
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">Total Filters</span>
                                <span class="tcb-summary-value">{filterCount}</span>
                            </div>
                            <div class="tcb-summary-row">
                                <span class="tcb-summary-label">Filter Logic</span>
                                <span class="tcb-summary-value">{criteria.Filter_Logic__c}</span>
                            </div>
                        </div>
                        <lightning-accordion allow-multiple-sections-open class="slds-m-top_medium">
                            <lightning-accordion-section label="Filter Details" name="filtersDetail">
                                <template if:true={hasFilters}>
                                    <template for:each={filters} for:item="f">
                                        <div key={f.id} class="tcb-filter-preview-row">
                                            <span class="tcb-filter-preview-label">Filter {f.id}</span>
                                            <span class="tcb-filter-preview-value">{f.field} {f.operator} {f.value}</span>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={hasFilters}>
                                    <p class="tcb-help-text">No filters configured.</p>
                                </template>
                            </lightning-accordion-section>
                        </lightning-accordion>
                    </div>
                </section>
            </template>

            <!-- Footer Buttons -->
            <div class="tcb-footer">
                <div class="tcb-footer-left">
                    <lightning-button label="Cancel" variant="neutral" onclick={handleBackToList}></lightning-button>
                </div>
                <div class="tcb-footer-right">
                    <template if:true={showPrevious}>
                        <lightning-button label="Previous" onclick={handlePrevious}
                            class="slds-m-right_small"></lightning-button>
                    </template>
                    <template if:true={showNext}>
                        <lightning-button label="Next" variant="brand" onclick={handleNext}
                            disabled={isNextDisabled} class="slds-m-right_small"></lightning-button>
                    </template>
                    <template if:true={criteria.Id}>
                        <lightning-button label="Run Preview" variant="neutral" icon-name="utility:preview"
                            onclick={handlePreview} disabled={isLoading}
                            class="slds-m-right_small"></lightning-button>
                    </template>
                    <lightning-button label="Save" variant="brand" icon-name="utility:save"
                        onclick={handleSave} disabled={isSaveDisabled}></lightning-button>
                </div>
            </div>
        </template>

        <!-- ═══════ PREVIEW MODAL ═══════ -->
        <template if:true={showPreview}>
            <section class="slds-modal slds-fade-in-open slds-modal_medium" role="dialog">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            class="slds-modal__close" onclick={handleClosePreview}></lightning-button-icon>
                        <h2 class="slds-modal__title">Preview Results</h2>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                            A live test against the current month — top 5 users.
                        </p>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- header chips: operator + period -->
                        <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">
                            <div class="slds-col">
                                <span class="tcb-detail-label">Operator</span>
                                <div class="tcb-detail-value">
                                    <span class="slds-badge slds-badge_lightest">{previewResult.operator}</span>
                                </div>
                            </div>
                            <div class="slds-col">
                                <span class="tcb-detail-label">Period</span>
                                <div class="tcb-detail-value">{previewPeriod}</div>
                            </div>
                        </div>

                        <template if:true={previewHasNote}>
                            <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_medium">
                                <lightning-icon icon-name="utility:info" size="x-small"
                                    class="slds-m-right_x-small"></lightning-icon>
                                {previewNote}
                            </div>
                        </template>

                        <template if:true={previewIsSuccess}>
                            <template if:true={previewHasRows}>
                                <h3 class="slds-text-heading_small slds-m-bottom_small">
                                    Sample Results — {previewResult.rowCount} user(s)
                                </h3>
                                <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                                    <thead>
                                        <tr class="slds-text-title_caps">
                                            <th>User / Owner Id</th>
                                            <th class="slds-text-align_right">Achievement Value</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={previewRows} for:item="row">
                                            <tr key={row.userId}>
                                                <td>{row.userId}</td>
                                                <td class="slds-text-align_right"><strong>{row.value}</strong></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template if:false={previewHasRows}>
                                <div class="slds-illustration slds-text-align_center slds-p-around_large slds-text-color_weak">
                                    No results for the current month. This usually means no source rows match the
                                    criterion's filter / date range for any user yet.
                                </div>
                            </template>
                        </template>

                        <template if:false={previewIsSuccess}>
                            <div class="slds-box slds-box_x-small slds-theme_error slds-m-top_small">
                                <strong>Query Error:</strong> {previewError}
                            </div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button variant="brand" label="Close" onclick={handleClosePreview}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- ═══════ DELETE CONFIRMATION ═══════ -->
        <template if:true={showDeleteConfirm}>
            <section class="slds-modal slds-fade-in-open slds-modal_small" role="dialog">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-modal__title">Delete Criteria</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>{deleteConfirmMessage}</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCancelDelete}
                            class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Delete" variant="destructive"
                            onclick={handleConfirmDelete}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>

    <template if:true={isLoading}>
        <div class="tcb-spinner-backdrop">
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </div>
    </template>
</template>
