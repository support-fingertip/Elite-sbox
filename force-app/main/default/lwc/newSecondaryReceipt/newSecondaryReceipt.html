<template>
    <template lwc:if={isSubPartLoad}>
        <div style="margin:40px">
            <c-loading-screen></c-loading-screen>
        </div>
    </template>
    <template lwc:else>
        <!-- New Secondary Receipt Form -->
        <template if:true={showNewSecondaryReceiptForm}>
            <div class="orders layouts" id="NewSecondaryReceiptLayout">
                <div class="slds-grid slds-wrap slds-gutters slds-p-around_medium" style="margin-top: 1.5rem; align-items: center;">
                    <div class="slds-col" style="flex: 0 0 auto;">
                        <h3 class="order-title" style="width: auto; margin-bottom: 0;">New Secondary Receipt</h3>
                    </div>
                    <div class="slds-col" style="flex: 1 1 auto; min-width: 350px; max-width: 900px; margin-left: 2rem;">
                        <div style="display: flex; gap: 1rem; align-items: flex-end;">
                            <div class="customer-search-container" style="flex: 1 1 0; min-width: 250px;">
                                <lightning-input label="Search Secondary Customers" type="search" required
                                    value={customerSearch} onchange={handleCustomerSearch} onfocus={handleCustomerFocus}>
                                </lightning-input>
                                <template if:true={showCustomerSuggestions}>
                                    <div class="suggestion-box" role="listbox">
                                        <ul class="slds-listbox slds-listbox_vertical">
                                            <template for:each={filteredCustomers} for:item="cust">
                                                <li key={cust.value} class="slds-listbox__item">
                                                    <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                        onclick={selectCustomer} data-id={cust.value} style="cursor: pointer;">
                                                        <span class="slds-media__figure slds-listbox__option-icon">
                                                            <lightning-icon icon-name="standard:contact" size="small"></lightning-icon>
                                                        </span>
                                                        <span class="slds-media__body">
                                                            <span class="slds-truncate" title={cust.label}>{cust.label}</span>
                                                        </span>
                                                    </div>
                                                </li>
                                            </template>
                                        </ul>
                                    </div>
                                </template>
                            </div>
                                <!-- Customer Name field removed as per new requirement -->
                        </div>
                    </div>
                    <div class="slds-col" style="flex: 0 0 auto; margin-left: 2rem; display: flex; gap: 1rem;">
                        <button class="actionButton" onclick={handleSave}>Save</button>
                        <button class="actionButton1" onclick={handleCancel}>Cancel</button>
                    </div>
                </div>
                <!-- All form fields in one white card -->
                <div style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.5rem; border: 1px solid #e0e0e0; margin: 2rem 0 1.5rem 0;">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-input type="date" label="Payment Date" value={paymentDate} onchange={handlePaymentDateChange} required></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-combobox label="Payment Mode" value={paymentMode} options={paymentModeOptions}
                                onchange={handlePaymentModeChange} placeholder="Select Payment Mode" required>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-input type="text" label="Reference Number" value={referenceNumber} onchange={handleReferenceNumberChange}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-input type="number" label="Amount" value={totalAmount} onchange={handleTotalAmountChange} required></lightning-input>
                            <template if:true={amountMessage}>
                                <div style="color: #e67e22; font-size: 14px; margin-top: 4px;">
                                    {amountMessage}
                                </div>
                            </template>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-p-around_small">
                            <lightning-textarea label="Remarks" value={remarks} onchange={handleRemarksChange} placeholder="Enter remarks..."></lightning-textarea>
                        </div>
                    </div>
                </div>
                <!-- New white card below Remarks -->
                    <!-- Pending Invoices card only shows after a secondary customer is selected -->
                    <template if:true={selectedCustomerId}>
                        <div style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.5rem; border: 1px solid #e0e0e0; margin: 1.5rem 0 0 0;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <h4 style="margin: 0; font-weight: 600; color: #333;">Pending Invoices</h4>
                                <button class="actionButton" style="white-space: nowrap; min-width: 200px; padding-left: 20px; padding-right: 20px;" onclick={handleAutoFillOldestFirst} disabled={isAutoFillDisabled}>Auto Fill Oldest First</button>
                            </div>
                            <div style="overflow-x: auto;">
                                <table class="contacts-table" style="width: 100%; border-collapse: collapse;">
                                    <thead>
                                        <tr>
                                            <th>Invoice no.</th>
                                            <th>Date</th>
                                            <th>Invoice amt (₹)</th>
                                            <th>Already paid (₹)</th>
                                            <th>Pending (₹)</th>
                                            <th>Paying now (₹)</th>
                                            <th>Balance (₹)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template if:true={pendingInvoices}>
                                            <template for:each={pendingInvoices} for:item="inv" for:index="index">
                                                <tr key={inv.InvId}>
                                                    <td><b>{inv.name}</b></td>
                                                    <td>{inv.InvDate}</td>
                                                    <td>₹{inv.invoiceAmount}</td>
                                                    <td>₹{inv.alreadyPaid}</td>
                                                    <td style="color: #e74c3c;">₹{inv.pendingAmount}</td>
                                                    <td>
                                                        <input type="number" style="width: 70px;" data-index={index} value={inv.payingNow} min="0" max={inv.pending} onchange={handlePayingNowChange} />
                                                    </td>
                                                    <td>₹{inv.balance}</td>
                                                </tr>
                                            </template>
                                        </template>
                                        <template if:false={pendingInvoices}>
                                            <tr>
                                                <td colspan="7" style="text-align:center; color:red; padding:10px; font-size:large;">No pending invoices found!</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Secondary Receipt List or Items Page Switch -->
        <template if:false={showNewSecondaryReceiptForm}>
            <template if:true={showReceiptItemsPage}>
                <div class="orders layouts" id="SecondaryReceiptItemsLayout">
                    <div class="order-head">
                        <h3 class="order-title">Secondary Invoice Items for Receipt: {selectedReceiptNo}</h3>
                        <div class="order-filters">
                            <button class="actionButton" onclick={handleBackToReceipts}>Back to Receipts</button>
                        </div>
                    </div>
                    <table class="contacts-table">
                        <thead>
                            <tr>
                                <th style="width:10%">S.No.</th>
                                <th style="width:45%">Item Name</th>
                                <th style="width:45%">Amount (₹)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template if:true={hasReceiptItems}>
                                <template for:each={receiptItems} for:item="item">
                                    <tr key={item.rowIndex}>
                                        <td style="width:10%">{item.rowIndex}</td>
                                        <td style="width:45%">{item.Name}</td>
                                        <td style="width:45%">₹{item.Amount}</td>
                                    </tr>
                                </template>
                            </template>
                            <template if:false={hasReceiptItems}>
                                <tr>
                                    <td colspan="3" style="text-align:center; color:red; padding:10px; font-size:large;">
                                        No items found for this receipt!
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template if:false={showReceiptItemsPage}>
                <div class="orders layouts" id="InvoiceLayout">
                    <h3 class="order-title">Secondary Receipts</h3>
                    <div class="order-head">
                        <div style="display: flex; justify-content: flex-start; align-items: flex-end; flex-wrap: wrap; gap: 1.2rem; margin-bottom: 1rem;">
                            <button class="actionButton" style="width:auto; padding:0 12px; white-space:nowrap;" onclick={handleNewSecondaryReceipt}>
                                New Secondary Receipt
                            </button>
                            <button class="actionButton" onclick={downloadReceiptsAsCSV}
                                style="background-color: #28a745; color: white; align-items: center; padding: 6px 12px; border-radius: 4px; border: none;">
                                <span style="align-items: center;">
                                    <lightning-icon icon-name="utility:download" alternative-text="Download"
                                        size="x-small"
                                        style="margin-left: 4px; --slds-c-icon-color-foreground-default: white;">
                                    </lightning-icon>
                                </span>
                            </button>
                            <lightning-input type="date" class="custominputfieldSize" label="From Date"
                                name="fromDate" value={fromDate} onchange={handleFromDateChange}
                                style="min-width: 180px;">
                            </lightning-input>
                            <lightning-input type="date" class="custominputfieldSize" label="To Date"
                                name="toDate" value={toDate} onchange={handleToDateChange}
                                style="min-width: 180px;">
                            </lightning-input>
                            <lightning-input type="search" label="Receipt No" class="custominputfieldSize"
                                placeholder="Search by Receipt No" value={searchReceiptNo}
                                onchange={handleSearchReceiptNo}
                                style="min-width: 220px;">
                            </lightning-input>
                            <lightning-input type="search" label="Customer Name" class="custominputfieldSize"
                                placeholder="Search Customer" value={searchSecondaryCustomerName}
                                onchange={handleListCustomerSearch}
                                style="min-width: 220px;">
                            </lightning-input>
                        </div>
                    </div>
                    <table class="contacts-table" style="margin-top: 20px;" width="100px">
                        <thead>
                            <tr>
                                <th style="width:5%">S.No.</th>
                                <th style="width:20%">Receipt No</th>
                                <th style="width:25%">Customer Name</th>
                                <th style="width:20%">Payment Mode</th>
                                <th style="width:15%">Payment Date</th>
                                <th style="width:15%">Reference No</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template if:true={receipts}>
                                <template for:each={receipts} for:item="rec">
                                    <tr key={rec.id}>
                                        <td style="width:5%">{rec.rowIndex}</td>
                                        <td style="width:20%">
                                            <span class="receipt-link" style="cursor:pointer;" onclick={handleReceiptClick} data-id={rec.id}>{rec.receiptNo}</span>
                                        </td>
                                        <td style="width:25%">{rec.customerName}</td>
                                        <td style="width:20%">{rec.paymentMode}</td>
                                        <td style="width:15%">{rec.paymentDate}</td>
                                        <td style="width:15%">{rec.referenceNumber}</td>
                                    </tr>
                                </template>
                            </template>
                            <template if:false={receipts}>
                                <tr>
                                    <td colspan="6" style="text-align:center; color:red; padding:10px; font-size:large;">
                                        No records found!
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </template>
        </template>
    <c-custom-toast auto-close-time="8000"></c-custom-toast>


</template>
