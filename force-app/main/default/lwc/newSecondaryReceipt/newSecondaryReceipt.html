<template>
    <template lwc:if={isSubPartLoad}>
        <div style="margin:40px">
            <c-loading-screen></c-loading-screen>
        </div>
    </template>
    <template lwc:else>
        <!-- New Secondary Receipt Form -->
        <template if:true={showNewSecondaryReceiptForm}>
            <div class="orders layouts" id="NewSecondaryReceiptLayout">
                <div class="slds-grid slds-wrap slds-gutters slds-p-around_medium" style="margin-top: 1.5rem; align-items: center;">
                    <div class="slds-col" style="flex: 0 0 auto;">
                        <h3 class="order-title" style="width: auto; margin-bottom: 0;">New Secondary Receipt</h3>
                    </div>
                    <div class="slds-col" style="flex: 1 1 auto; min-width: 350px; max-width: 500px; margin-left: 2rem;">
                        <div style="position: relative;">
                            <lightning-input label="Search Secondary Customers" type="search" required
                                value={customerSearch} onchange={handleCustomerSearch} onfocus={handleCustomerFocus}>
                            </lightning-input>
                            <template if:true={showCustomerSuggestions}>
                                <div class="suggestion-box" role="listbox">
                                    <ul class="slds-listbox slds-listbox_vertical">
                                        <template for:each={filteredCustomers} for:item="cust">
                                            <li key={cust.value} class="slds-listbox__item">
                                                <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                    onclick={selectCustomer} data-id={cust.value} style="cursor: pointer;">
                                                    <span class="slds-media__figure slds-listbox__option-icon">
                                                        <lightning-icon icon-name="standard:contact" size="small"></lightning-icon>
                                                    </span>
                                                    <span class="slds-media__body">
                                                        <span class="slds-truncate" title={cust.label}>{cust.label}</span>
                                                    </span>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div class="slds-col" style="flex: 0 0 auto; margin-left: 2rem; display: flex; gap: 1rem;">
                        <button class="actionButton" onclick={handleSave}>Save</button>
                        <button class="actionButton1" onclick={handleCancel}>Cancel</button>
                    </div>
                </div>
                <div class="invoice-grid-container" style="padding: 1.5rem;">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-input type="date" label="Payment Date" value={paymentDate} onchange={handlePaymentDateChange} required></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-combobox label="Payment Mode" value={paymentMode} options={paymentModeOptions}
                                onchange={handlePaymentModeChange} placeholder="Select Payment Mode" required>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-input type="text" label="Reference Number" value={referenceNumber} onchange={handleReferenceNumberChange}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <lightning-textarea label="Remarks" value={remarks} onchange={handleRemarksChange} placeholder="Enter remarks..."></lightning-textarea>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Secondary Receipt List -->
        <template if:false={showNewSecondaryReceiptForm}>
            <div class="orders layouts" id="InvoiceLayout">
                <h3 class="order-title">Secondary Receipts</h3>
                <div class="order-head">
                    <div class="order-filters">
                        <button class="actionButton" style="margin-top:30px; width:auto; padding:0 12px; white-space:nowrap; background-color: #28a745; color: white;" onclick={handleNewSecondaryReceipt}>
                            New Secondary Receipt
                        </button>
                        <button class="actionButton" onclick={downloadReceiptsAsCSV}
                            style="background-color: #28a745; color: white; margin-top:30px; align-items: center; padding: 6px 12px; border-radius: 4px;">
                            <span style="align-items: center;">
                                <lightning-icon icon-name="utility:download" alternative-text="Download"
                                    size="x-small"
                                    style="margin-left: 4px; --slds-c-icon-color-foreground-default: white;">
                                </lightning-icon>
                            </span>
                        </button>
                        <lightning-input type="date" class="custominputfieldSize" label="From Date"
                            name="fromDate" value={fromDate} onchange={handleFromDateChange}>
                        </lightning-input>
                        <lightning-input type="date" class="custominputfieldSize" label="To Date"
                            name="toDate" value={toDate} onchange={handleToDateChange}>
                        </lightning-input>
                        <lightning-input type="search" label="Receipt No" class="custominputfieldSize"
                            placeholder="Search by Receipt No" value={searchReceiptNo}
                            onchange={handleSearchReceiptNo}>
                        </lightning-input>
                        <lightning-input type="search" label="Customer Name" class="custominputfieldSize"
                            placeholder="Search Customer" value={searchSecondaryCustomerName}
                            onchange={handleListCustomerSearch}>
                        </lightning-input>
                    </div>
                </div>

                <table class="contacts-table" style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th style="width:5%;">S.No.</th>
                            <th style="width:20%;">Receipt No</th>
                            <th style="width:25%;">Customer Name</th>
                            <th style="width:20%;">Reason</th>
                            <th style="width:15%;">Date</th>
                            <th style="width:15%;">Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template if:true={receipts}>
                            <template for:each={receipts} for:item="rec">
                                <tr key={rec.id}>
                                    <td style="width:5%">{rec.rowIndex}</td>
                                    <td style="width:20%">{rec.receiptNo}</td>
                                    <td style="width:25%">{rec.customerName}</td>
                                    <td style="width:20%">{rec.paymentMode}</td>
                                    <td style="width:15%">{rec.paymentDate}</td>
                                    <td style="width:15%">{rec.referenceNumber}</td>
                                </tr>
                            </template>
                        </template>
                        <template if:false={receipts}>
                            <tr>
                                <td colspan="6" style="text-align:center; color:red; padding:10px; font-size:large;">
                                    No records found!
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </template>
    <c-custom-toast auto-close-time="8000"></c-custom-toast>
</template>
